merge_policy:
  pr_allowed_phase: ready
  branch_local_artifacts:
    - path: .phase-gate/state.json
      reason: "MCP workflow state — branch-local, must never reach main"
    - path: .phase-gate/deliverables.json
      reason: "MCP workflow deliverables — branch-local, must never reach main"
    - path: .phase-gate/quality_state.json
      reason: "QA baseline state — branch-local, must never reach main"

workflows:
  feature:
    phases:
      - name: research
        exit_requires:
          - id: research-doc
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/research*.md
        instructions:
          sub_role: researcher
          phase_instructions: |
            Create a TODO list and work through it step by step:

            [ ] Read the issue: get_issue(issue_number=N).
            [ ] Explore the codebase for relevant patterns and constraints.
            [ ] Document findings in docs/development/issueN/research.md.
            [ ] Commit: git_add_or_commit(workflow_phase='research', message='Research findings (#N)')
            [ ] Produce hand-over for planner/designer.
          handover_template: |
            ### Research → Design Hand-over
            #### Scope
            - Issue: #N
            #### Files
            - docs/development/issueN/research.md (new)
            #### Stop-Go Proof
            - Research doc committed
      - name: design
        exit_requires:
          - id: design-doc
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/design*.md
        instructions:
          sub_role: designer
          phase_instructions: |
            Create a TODO list and work through it step by step:

            [ ] Read research: docs/development/issueN/research.md.
            [ ] Create design document: scaffold_artifact(artifact_type='design', name='design').
            [ ] Document architecture decisions, data flow, interfaces, test approach.
            [ ] Commit: git_add_or_commit(workflow_phase='design', message='Design for #N')
            [ ] Produce hand-over for QA design review.
          handover_template: |
            ### Design → QA Hand-over
            #### Scope
            - Issue: #N
            #### Files
            - docs/development/issueN/design.md (new)
            #### Stop-Go Proof
            - Design doc committed
      - name: planning
        exit_requires:
          - id: planning-doc
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/planning*.md
        instructions:
          sub_role: planner
          phase_instructions: |
            Create a TODO list and work through it step by step:

            [ ] Read design: docs/development/issueN/design.md.
            [ ] Create planning document: scaffold_artifact(artifact_type='planning', name='planning') or safe_edit_file.
            [ ] Define TDD cycles with deliverables per cycle.
            [ ] Save deliverables: save_planning_deliverables(issue_number=N, planning_deliverables={...})
            [ ] Commit: git_add_or_commit(workflow_phase='planning', message='Planning for #N')
            [ ] Produce hand-over for QA plan review.
          handover_template: |
            ### Planning → QA Hand-over
            #### Scope
            - Issue: #N
            - Cycles planned: <N>
            #### Files
            - docs/development/issueN/planning.md (new)
            #### Stop-Go Proof
            - Planning doc and deliverables committed
      - name: implementation
        cycle_based: true
        subphases: [red, green, refactor]
        commit_type_map:
          red: test
          green: feat
          refactor: refactor
        exit_requires:
          - id: implementation-test-suite
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/*test_suite*.md
        instructions:
          sub_role: implementer
          phase_instructions: |
            Create a TODO list now and work through it step by step:

            [ ] Call get_project_plan(issue_number=N) — read ALL cycle deliverables
                before writing any code.

            Per cycle (repeat until all cycles complete):
            [ ] RED: write failing test first — no implementation code yet.
                run_tests(path='<test file>') — verify it FAILS.
                git_add_or_commit(workflow_phase='implementation', sub_phase='red',
                  cycle_number=N, message='...')
            [ ] GREEN: write minimal code to pass the test — no cleanup yet.
                run_tests(path='<test file>') — verify it PASSES.
                git_add_or_commit(workflow_phase='implementation', sub_phase='green',
                  cycle_number=N, message='...')
            [ ] REFACTOR: clean up while keeping tests green.
                run_quality_gates(scope='files', files=['<changed files>'])
                git_add_or_commit(workflow_phase='implementation', sub_phase='refactor',
                  cycle_number=N, message='...')
            [ ] If more cycles: transition_cycle(to_cycle=N+1), then get_work_context.

            Hard rules — never violate:
            - RED is mandatory. Never write implementation before a failing test.
            - Never skip REFACTOR. Quality gates are enforced here.
            - Never self-declare GO. QA decides after reviewing the hand-over.
            - Never call merge_pr. Human approval is required.

            Produce this hand-over when all cycles are complete:
            ### Imp → QA hand-over
            #### Scope
            - Cycles executed: <list>
            - Out of scope: <list>
            #### Files
            **Tests:** <path> (new/modified)
            **Implementation:** <path> (new/modified)
            #### Deliverables
            - C1.D1: <name> — ✅ satisfied | ❌ not satisfied
            #### Stop-Go Proof
            - Tests: run_tests(path='...') → <N passed, 0 failed>
            - Gates: run_quality_gates(scope='files') → <N/N green>
          handover_template: |
            ### Imp → QA hand-over
            #### Scope
            - Cycles executed: <list>
            - Out of scope: <list>

            #### Files
            **Tests:** <path> (new/modified)
            **Implementation:** <path> (new/modified)

            #### Deliverables
            - C1.D1: <name> — ✅ satisfied | ❌ not satisfied

            #### Stop-Go Proof
            - Tests: run_tests(path='...') → <N passed, 0 failed>
            - Gates: run_quality_gates(scope='files') → <N/N green>
      - name: validation
        exit_requires:
          - id: validation-report
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/validation*.md
        instructions:
          sub_role: validator
          phase_instructions: |
            Create a TODO list and work through it step by step:

            [ ] Run full test suite: run_tests(scope='full')
            [ ] Run quality gates: run_quality_gates(scope='branch')
            [ ] Validate architecture: validate_architecture(scope='all')
            [ ] Document results in docs/development/issueN/validation.md.
            [ ] Commit: git_add_or_commit(workflow_phase='validation', message='Validation for #N')
            [ ] Produce hand-over for QA review.
          handover_template: |
            ### Validation → QA Hand-over
            #### Scope
            - Issue: #N
            #### Files
            - docs/development/issueN/validation.md (new)
            #### Stop-Go Proof
            - Tests: run_tests(scope='full') → <N passed>
            - Gates: run_quality_gates(scope='branch') → all green
      - name: documentation
        exit_requires:
          - id: documentation-handover
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/SESSIE_OVERDRACHT*.md
        instructions:
          sub_role: documenter
          phase_instructions: |
            Create a TODO list and work through it step by step:

            [ ] Update or create relevant documentation files.
            [ ] Create session hand-over: docs/development/issueN/SESSIE_OVERDRACHT.md.
            [ ] Commit: git_add_or_commit(workflow_phase='documentation', message='Documentation for #N')
            [ ] Produce hand-over for QA doc review.
          handover_template: |
            ### Documentation → QA Hand-over
            #### Scope
            - Issue: #N
            #### Files
            - docs/development/issueN/SESSIE_OVERDRACHT.md (new)
            #### Stop-Go Proof
            - Documentation committed
      - name: ready
        instructions:
          sub_role: implementer
          phase_instructions: |
            The branch is ready for PR submission.

            [ ] Run final quality gate: run_quality_gates(scope='branch')
            [ ] Submit PR: submit_pr(head='<branch>', title='<title>', body='...')
            [ ] Do NOT call merge_pr — human approval required.
          handover_template: |
            ### Ready → Merge Hand-over
            #### Scope
            - Issue: #N
            #### Stop-Go Proof
            - Quality gates: run_quality_gates(scope='branch') → all green
            - PR submitted (merge requires human approval)

