enforcement:
  - event_source: tool
    tool: create_branch
    timing: pre
    actions:
      - type: check_branch_policy
        policy: base_restriction
        rules:
          hotfix: [main]
          epic: [main]
          feature: [main, "epic/*", "refactor/*"]
          bug: [main, "epic/*", "feature/*"]
          fix: [main, "epic/*"]
          refactor: [main, "epic/*"]
          docs: [main, "epic/*"]
  - event_source: tool
    tool_category: branch_mutating
    timing: pre
    actions:
      - type: check_pr_status
  - event_source: tool
    tool: submit_pr
    timing: pre
    actions:
      - type: check_phase_readiness
        policy: ready
