global:
  emojis:
    success: "✅"
    failure: "❌"
    warning: "⚠️"
    query: "📋"
    bootstrap: "🚀"
  default_failure_template: "Failed: {error_message}"
  next_instruction_texts:
    uri_reference: "*(Full details available in the structured JSON payload. View resource: pgmcp://cache/runs/{run_id})*"
    context_reset: "🚀 REQUIRED NEXT STEP: Call get_work_context now before any other tool call to load the current phase context for this branch."
    server_restart: "⏳ WAIT 3 SECONDS before continuing - server needs time to reload. Service will be unavailable briefly during restart."
    branch_lockdown: "⚠️ Warning: Branch is now locked down. Branch-mutating tools are blocked until the PR is merged."
    todo_discipline: "📋 TODO discipline: create or refresh your TODO list now; keep exactly one item in progress and update it after each material step."
    recheck_quality: "📋 REQUIRED NEXT STEP: Run run_quality_gates(scope='files', files={modified_files}) to verify that the auto-fixed files now pass all quality checks."
tools:
  auto_fix:
    template_success: |
      **Auto-Fix Run Completed Successfully**
      - Gates executed: {gates_executed_count} ({gates_executed})
      - Files modified: {modified_files_count}
      {formatted_modified_files}
    template_failure: |
      **Auto-Fix Run Failed**
      - Error: {error_message}
      - Gates executed: {gates_executed_count} ({gates_executed})
      - Files modified: {modified_files_count}
    next_instructions:
      - "uri_reference"
  health_check:
    template_success: |
      **Server Health Status**
      - Status: {status}
      - Version: {version}
      - Process ID: {pid}
      - Platform: {platform}
      - Uptime: {uptime_seconds} seconds
  restart_server:
    template_success: "Server restart initiated successfully (Reason: {reason})."
    next_instructions:
      - "server_restart"
  transition_cycle:
    template_success: "Transitioned to Cycle {to_cycle}/{total_cycles} ({cycle_name}) on branch '{branch}' (Passed gates: {passing_gates_count}, Skipped gates: {skipped_gates_count})."
    next_instructions:
      - "context_reset"
  force_cycle_transition:
    template_success: "Transitioned to Cycle {to_cycle}/{total_cycles} ({cycle_name}) on branch '{branch}' (Passed gates: {passing_gates_count}, Skipped gates: {skipped_gates_count})."
    next_instructions:
      - "context_reset"
  search_documentation:
    template_success: "Found {results_count} documentation matches for query '{query}' in scope '{scope}'."
  get_work_context:
    template_success: |
      Branch: `{current_branch}` | Workflow: {workflow_name} | Issue: #{issue_number}
      Phase: {phase} (confidence={phase_confidence})
      Role: {sub_role_hint}
      Parent: {parent_branch}
    next_instructions:
      - "todo_discipline"
  initialize_project:
    template_success: "Initialized project for issue #{issue_number} on branch '{branch}' (Initial Phase: '{initial_phase}')."
    next_instructions:
      - "context_reset"
  get_project_plan:
    template_success: "**Project Plan for Issue #{issue_number}** (Workflow: {workflow_name})."
  save_planning_deliverables:
    template_success: "Planning deliverables for issue #{issue_number} ({total_cycles} cycles, {total_deliverables} deliverables)."
  update_planning_deliverables:
    template_success: "Planning deliverables for issue #{issue_number} ({total_cycles} cycles, {total_deliverables} deliverables)."
  git_list_branches:
    template_success: "Found {branches_count} branches. Current branch is '{current_branch}'."
  git_diff_stat:
    template_success: |
      **Git Diff Summary** (Comparing {source_branch} -> {target_branch})
      - Files changed: {files_changed}
      - Insertions: +{insertions}
      - Deletions: -{deletions}
  get_parent_branch:
    template_success: "Branch '{branch}' has parent branch: '{parent_branch}'."
  check_merge:
    template_success: "Merge verification confirmed: SHA {merge_sha} is reachable from HEAD."
    template_failure: "Merge verification failed: SHA {merge_sha} is NOT reachable from HEAD."
  git_status:
    template_success: |
      **Git Status Summary**
      - Branch: {branch}
      - Clean: {is_clean}
      - Modified: {modified_count} files
      - Untracked: {untracked_count} files
  create_branch:
    template_success: "Created branch '{branch_name}' of type '{branch_type}' from '{base_branch}'."
    next_instructions:
      - "context_reset"
  git_add_or_commit:
    template_success: "Committed changes to '{branch}' with hash {commit_hash} (Phase: {workflow_phase}, Type: {commit_type})."
  git_restore:
    template_success: "Restored {files_count} file(s) from {source}."
  git_checkout:
    template_success: "Switched branch '{previous_branch}' -> '{branch}' (Current Phase: '{current_phase}')."
    next_instructions:
      - "context_reset"
  git_push:
    template_success: "Pushed branch '{branch}' to origin (Upstream branch created: {new_upstream_created})."
  git_merge:
    template_success: "Merged branch '{source_branch}' into '{target_branch}' successfully."
  git_delete_branch:
    template_success: "Deleted branch '{branch}' (Local: {local_status}, Remote: {remote_status})."
  git_stash:
    template_success: "Stash action '{action}' executed successfully."
  git_fetch:
    template_success: "Fetched updates from remote '{remote}'."
  git_pull:
    template_success: "Pulled updates from remote '{remote}'."
    next_instructions:
      - "context_reset"
  create_issue:
    template_success: &issue_success_template "Issue #{number}: {title}.\nURL: {html_url}"
  update_issue:
    template_success: *issue_success_template
  get_issue:
    template_success: |
      **Issue #{number}: {title}**
      - State: {state}
      - Milestone: {milestone_title}
      - Assignees: {assignees_summary}
  close_issue:
    template_success: "Closed issue #{issue_number} successfully."
  list_issues:
    template_success: "Found {issues_count} issues matching criteria."
  get_pr:
    template_success: &pr_detail_template |
      PR #{number}: {title}
      URL: {html_url}
      - Target: {base_ref}
      - Source: {head_ref}
  submit_pr:
    template_success: *pr_detail_template
    next_instructions:
      - "branch_lockdown"
  merge_pr:
    template_success: "Merged PR #{pr_number} using strategy '{merge_method}' (SHA: {merge_sha})."
  list_prs:
    template_success: "Found {prs_count} pull requests matching criteria."
