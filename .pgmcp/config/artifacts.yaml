        items:
          type: string
      requirements_nonfunctional:
        type: array
        title: Requirements Nonfunctional
        description: Non-functional requirements (performance, maintainability, etc.)
        required: true
        items:
          type: string
      decision:
        type: string
        title: Decision
        description: The chosen design decision
        required: true
      rationale:
        type: string
        title: Rationale
        description: Rationale for the chosen decision
        required: true
      purpose:
        type: string
        title: Purpose
        description: Purpose of this design document
