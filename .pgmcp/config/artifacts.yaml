version: 1.0.0
artifact_types:
  - type: code
    type_id: dto
    context_schema:
      dto_name:
        type: string
        title: Dto Name
        description: Name of the DTO class (PascalCase required)
        required: true
      fields:
        type: array
        title: Fields
        description: 'List of field definitions (format: ''name: type'')'
        required: false
        items:
          type: string
      description:
        type: string
        title: Description
        description: DTO Description
        required: false
    name: Data Transfer Object
    description: Data Transfer Object - immutable data container (Pydantic BaseModel)
    output_type: file
    scaffolder_class: DTOScaffolder
    scaffolder_module: mcp_server.scaffolders.dto_scaffolder
    template_path: concrete/dto.py.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .py
    generate_test: true
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: worker
    context_schema:
      name:
        type: string
        title: Name
        description: Name of the Worker class (PascalCase required)
        required: true
      layer:
        type: string
        title: Layer
        description: Architectural layer (platform|strategy|platform_within_strategy)
        required: true
      module_description:
        type: string
        title: Module Description
        description: Description of the worker module
        required: false
      worker_scope:
        type: string
        title: Worker Scope
        description: Worker scope (platform|strategy|platform_within_strategy)
        required: false
      responsibilities:
        type: array
        title: Responsibilities
        description: List of worker responsibilities
        required: false
        items:
          type: string
      capabilities:
        type: array
        title: Capabilities
        description: List of required capabilities (dependency injection)
        required: false
        items:
          type: string
      use_async:
        type: boolean
        title: Use Async
        description: If True, scaffold async warmup example
        required: false
    name: Worker
    description: Worker - executes single domain operation (async task processor)
    output_type: file
    scaffolder_class: WorkerScaffolder
    scaffolder_module: mcp_server.scaffolders.worker_scaffolder
    template_path: concrete/worker.py.jinja2
    fallback_template: null
    name_suffix: Worker
    file_extension: .py
    generate_test: true
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: adapter
    context_schema:
      name:
        type: string
        title: Name
        description: Name of the adapter class (PascalCase required)
        required: true
      description:
        type: string
        title: Description
        description: Description of the adapter's purpose
        required: false
      target_interface:
        type: string
        title: Target Interface
        description: Target interface or protocol implemented by the adapter
        required: false
      methods:
        type: array
        title: Methods
        description: Optional structured method definitions
        required: false
        items:
          type: string
    name: Adapter
    description: Adapter - integrates external systems (implements Interface)
    output_type: file
    template_path: concrete/adapter.py.jinja2
    fallback_template: null
    name_suffix: Adapter
    file_extension: .py
    generate_test: true
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: tool
    context_schema:
      name:
        type: string
        title: Name
        description: Name of the Tool class (PascalCase required)
        required: true
      description:
        type: string
        title: Description
        description: Description of the tool's purpose
        required: false
      layer:
        type: string
        title: Layer
        description: Architectural layer of the tool
        required: false
      responsibilities:
        type: array
        title: Responsibilities
        description: List of tool responsibilities
        required: false
        items:
          type: string
    name: MCP Tool
    description: MCP Tool - exposes functionality via MCP protocol
    output_type: file
    scaffolder_class: ToolScaffolder
    scaffolder_module: mcp_server.scaffolders.tool_scaffolder
    template_path: concrete/tool.py.jinja2
    fallback_template: null
    name_suffix: Tool
    file_extension: .py
    generate_test: true
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: resource
    context_schema:
      name:
        type: string
        title: Name
        description: Name of the resource class (PascalCase required)
        required: true
      description:
        type: string
        title: Description
        description: Description of the resource's purpose
        required: false
      resource_type:
        type: string
        title: Resource Type
        description: Resource category or protocol surface
        required: false
      methods:
        type: array
        title: Methods
        description: Optional structured method definitions
        required: false
        items:
          type: string
    name: MCP Resource
    description: MCP Resource - provides dynamic content
    output_type: file
    template_path: concrete/resource.py.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .py
    generate_test: true
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: schema
    context_schema:
      name:
        type: string
        title: Name
        description: Name of the Schema class (PascalCase required)
        required: true
      description:
        type: string
        title: Description
        description: Description of the schema's purpose
        required: false
      layer:
        type: string
        title: Layer
        description: Architectural layer of the schema
        required: false
      fields:
        type: array
        title: Fields
        description: 'List of field definitions (format: ''name: type'')'
        required: false
        items:
          type: string
      frozen:
        type: boolean
        title: Frozen
        description: If True, generate frozen=True in model_config (immutable config)
        required: false
      examples:
        type: array
        title: Examples
        description: Example values for self-documentation
        required: false
        items:
          type: string
    name: Pydantic Schema
    description: Pydantic Schema - validation models
    output_type: file
    scaffolder_class: SchemaScaffolder
    scaffolder_module: mcp_server.scaffolders.schema_scaffolder
    template_path: concrete/config_schema.py.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .py
    generate_test: true
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: interface
    context_schema:
      name:
        type: string
        title: Name
        description: Name of the interface class (PascalCase required)
        required: true
      description:
        type: string
        title: Description
        description: Description of the interface's purpose
        required: false
      methods:
        type: array
        title: Methods
        description: Optional structured method definitions
        required: false
        items:
          type: string
    name: Interface
    description: Interface - abstract protocol definition
    output_type: file
    template_path: concrete/interface.py.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .py
    generate_test: true
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: service
    context_schema:
      name:
        type: string
        title: Name
        description: Name of the Service command class (PascalCase required)
        required: true
      description:
        type: string
        title: Description
        description: Description of the service command's purpose
        required: false
      layer:
        type: string
        title: Layer
        description: Architectural layer of the service
        required: false
      responsibilities:
        type: array
        title: Responsibilities
        description: List of service responsibilities
        required: false
        items:
          type: string
      parameters:
        type: array
        title: Parameters
        description: 'List of parameter definitions (format: ''name: type'')'
        required: false
        items:
          type: string
      return_type:
        type: string
        title: Return Type
        description: Return type annotation for the execute() method
        required: false
    name: Service
    description: Service - orchestration or business logic
    output_type: file
    scaffolder_class: ServiceScaffolder
    scaffolder_module: mcp_server.scaffolders.service_scaffolder
    template_path: concrete/service_command.py.jinja2
    fallback_template: null
    name_suffix: Service
    file_extension: .py
    generate_test: true
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: generic
    context_schema:
      name:
        type: string
        title: Name
        description: Name of the class (PascalCase required)
        required: true
      description:
        type: string
        title: Description
        description: Description of the class's purpose
        required: false
      layer:
        type: string
        title: Layer
        description: Architectural layer (e.g. 'Backend (Generic)', 'MCP Server')
        required: false
      methods:
        type: array
        title: Methods
        description: List of structured method definitions to scaffold
        required: false
        items:
          type: string
      responsibilities:
        type: array
        title: Responsibilities
        description: List of responsibility descriptions
        required: false
        items:
          type: string
    name: Generic Component
    description: Generic component from custom template
    output_type: file
    scaffolder_class: GenericScaffolder
    scaffolder_module: mcp_server.scaffolders.generic_scaffolder
    template_path: concrete/generic.py.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .py
    generate_test: false
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: unit_test
    context_schema:
      module_under_test:
        type: string
        title: Module Under Test
        description: Fully qualified module path (e.g. 'mcp_server.schemas.contexts.dto')
        required: true
      test_class_name:
        type: string
        title: Test Class Name
        description: Name of the test class (PascalCase, e.g. TestDTOContext)
        required: true
      test_description:
        type: string
        title: Test Description
        description: Optional test suite description
        required: false
      test_focus:
        type: string
        title: Test Focus
        description: What this test suite focuses on (docstring line)
        required: false
      additional_responsibility:
        type: string
        title: Additional Responsibility
        description: Extra responsibility line in docstring
        required: false
      imported_classes:
        type: array
        title: Imported Classes
        description: List of class names to import from module_under_test
        required: false
        items:
          type: string
      has_mocks:
        type: boolean
        title: Has Mocks
        description: If True, include unittest.mock imports
        required: false
      has_async_tests:
        type: boolean
        title: Has Async Tests
        description: If True, include asyncio imports and pytest-asyncio markers
        required: false
      has_pydantic:
        type: boolean
        title: Has Pydantic
        description: If True, include pydantic ValidationError import
        required: false
      test_methods:
        type: array
        title: Test Methods
        description: List of test method definitions for the template
        required: false
        items:
          type: string
    name: Unit Test
    description: Unit test file with proper structure and quality gates
    output_type: file
    scaffolder_class: GenericScaffolder
    scaffolder_module: mcp_server.scaffolders.generic_scaffolder
    template_path: concrete/test_unit.py.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .py
    generate_test: false
    base_path: tests/mcp_server/unit/
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: code
    type_id: integration_test
    context_schema:
      test_scenario:
        type: string
        title: Test Scenario
        description: Name of the integration scenario being tested (snake_case)
        required: true
      test_class_name:
        type: string
        title: Test Class Name
        description: Name of the test class (PascalCase, e.g. TestScaffoldDTOE2E)
        required: true
      test_description:
        type: string
        title: Test Description
        description: Optional test suite description
        required: false
      managers_needed:
        type: array
        title: Managers Needed
        description: List of manager class names needed for the integration test
        required: false
        items:
          type: string
      workspace_fixture:
        type: boolean
        title: Workspace Fixture
        description: If True, scaffold a temp_workspace pytest fixture
        required: false
      test_methods:
        type: array
        title: Test Methods
        description: List of test method definitions for the template
        required: false
        items:
          type: string
    name: Integration Test
    description: Integration/E2E test file with @module structure
    output_type: file
    scaffolder_class: GenericScaffolder
    scaffolder_module: mcp_server.scaffolders.generic_scaffolder
    template_path: concrete/test_integration.py.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .py
    generate_test: false
    base_path: tests/mcp_server/integration/
    state_machine:
      states:
        - CREATED
      initial_state: CREATED
      valid_transitions: []
  - type: doc
    type_id: research
    context_schema:
      title:
        type: string
        title: Title
        description: Artifact title
        required: true
      status:
        type: string
        title: Status
        description: Document lifecycle status (DRAFT|PRELIMINARY|APPROVED|DEFINITIVE|DEPRECATED|PENDING)
        required: true
      version:
        type: string
        title: Version
        description: Document version in x.y or x.y.z format (e.g. 1.0, 2.3.1)
        required: true
      last_updated:
        type: string
        title: Last Updated
        description: Last updated date in ISO format YYYY-MM-DD
        required: true
      problem_statement:
        type: string
        title: Problem Statement
        description: Problem or question being investigated
        required: true
      goals:
        type: array
        title: Goals
        description: Research goals / questions to answer
        required: true
        items:
          type: string
      purpose:
        type: string
        title: Purpose
        description: Purpose of this research document
        required: false
      scope_in:
        type: string
        title: Scope In
        description: What is in scope
        required: false
      scope_out:
        type: string
        title: Scope Out
        description: What is out of scope
        required: false
      prerequisites:
        type: array
        title: Prerequisites
        description: Prerequisites or prior knowledge required
        required: false
        items:
          type: string
      background:
        type: string
        title: Background
        description: Background context and prior art
        required: false
      findings:
        type: string
        title: Findings
        description: Findings and conclusions so far
        required: false
      questions_list:
        type: array
        title: Questions List
        description: Open questions remaining after research
        required: false
        items:
          type: string
      references:
        type: array
        title: References
        description: External references and links
        required: false
        items:
          type: string
      related_docs:
        type: array
        title: Related Docs
        description: Related documents in the project
        required: false
        items:
          type: string
      approved_strategy:
        type: string
        title: Approved Strategy
        description: The approved compatibility and migration policy/strategy for
          the issue
        required: false
      expected_results:
        type: string
        title: Expected Results
        description: The expected outcomes and verification baseline for the issue
        required: false
    name: Research Document
    description: Research phase findings and questions
    output_type: file
    template_path: concrete/research.md.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .md
    generate_test: false
    state_machine:
      states:
        - DRAFT
        - APPROVED
        - DEFINITIVE
      initial_state: DRAFT
      valid_transitions:
        - from: DRAFT
          to:
            - APPROVED
            - DEFINITIVE
        - from: APPROVED
          to:
            - DEFINITIVE
  - type: doc
    type_id: planning
    context_schema:
      title:
        type: string
        title: Title
        description: Artifact title
        required: true
      status:
        type: string
        title: Status
        description: Document lifecycle status (DRAFT|PRELIMINARY|APPROVED|DEFINITIVE|DEPRECATED|PENDING)
        required: true
      version:
        type: string
        title: Version
        description: Document version in x.y or x.y.z format (e.g. 1.0, 2.3.1)
        required: true
      last_updated:
        type: string
        title: Last Updated
        description: Last updated date in ISO format YYYY-MM-DD
        required: true
      summary:
        type: string
        title: Summary
        description: High-level summary of what is being planned
        required: true
      cycles:
        type: array
        title: Cycles
        description: 'TDD cycle breakdown. Each entry is a dict with keys: name (str),
          goal (str), tests (list[str]), success_criteria (list[str] | str), dependencies
          (list[str], optional).'
        required: true
        items:
          type: object
      purpose:
        type: string
        title: Purpose
        description: Purpose of this planning document
        required: false
      scope_in:
        type: string
        title: Scope In
        description: What is in scope
        required: false
      scope_out:
        type: string
        title: Scope Out
        description: What is out of scope
        required: false
      prerequisites:
        type: array
        title: Prerequisites
        description: Prerequisites before work can begin
        required: false
        items:
          type: string
      dependencies:
        type: array
        title: Dependencies
        description: Dependencies between cycles or on external work
        required: false
        items:
          type: string
      risks:
        type: array
        title: Risks
        description: 'Identified risks. Each entry is a dict with keys: description
          (str), mitigation (str).'
        required: false
        items:
          type: object
      milestones:
        type: array
        title: Milestones
        description: Key milestones and checkpoints
        required: false
        items:
          type: string
      related_docs:
        type: array
        title: Related Docs
        description: Related documents in the project
        required: false
        items:
          type: string
    name: Planning Document
    description: Planning phase TDD cycle breakdown
    output_type: file
    template_path: concrete/planning.md.jinja2
    fallback_template: null
    name_suffix: null
    file_extension: .md
    generate_test: false
    state_machine:
      states:
        - DRAFT
        - APPROVED
        - DEFINITIVE
      initial_state: DRAFT
      valid_transitions:
        - from: DRAFT
          to:
            - APPROVED
            - DEFINITIVE
        - from: APPROVED
          to:
            - DEFINITIVE
  - type: doc
    type_id: design
    context_schema:
      title:
        type: string
        title: Title
        description: Artifact title
        required: true
      status:
        type: string
        title: Status
        description: Document lifecycle status (DRAFT|PRELIMINARY|APPROVED|DEFINITIVE|DEPRECATED|PENDING)
        required: true
      version:
