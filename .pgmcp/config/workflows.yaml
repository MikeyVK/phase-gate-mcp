# Workflow Configuration
# Schema Version: 1.0
# Phase ordering (SSOT): .phase-gate/config/contracts.yaml (workflow → phase membership)
# Phase definitions: .phase-gate/config/workphases.yaml (phase metadata, subphase whitelists, commit type hints)
# Documentation: docs/reference/WORKFLOWS.md

version: "1.0.0"
phase_source: ".phase-gate/config/workphases.yaml"

workflows:
  # Feature Development (full workflow)
  feature:
    name: feature
    description: "Full development workflow with all phases (research → design → planning → implementation → validation → docs)"
    default_execution_mode: interactive

  # Bug Fix (with lightweight design phase for uniformity)
  bug:
    name: bug
    description: "Bug fix workflow (research → design → planning → implementation → validation → docs)"
    default_execution_mode: interactive

  # Hotfix (minimal workflow)
  hotfix:
    name: hotfix
    description: "Emergency fix workflow (implementation → validation → docs only)"
    default_execution_mode: autonomous

  # Refactor (no design phase by default)
  refactor:
    name: refactor
    description: "Code refactoring workflow (research → planning → implementation → validation → docs)"
    default_execution_mode: interactive

  # Documentation (minimal workflow)
  docs:
    name: docs
    description: "Documentation-only workflow (planning → docs)"
    default_execution_mode: interactive

  # Epic (research and planning focused)
  epic:
    name: epic
    description: "Epic workflow for large initiatives (research → planning → design → coordination → documentation)"
    default_execution_mode: interactive
