      - name: validation
        exit_requires:
          - id: validation-report
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/validation*.md
        instructions:
          sub_role: validator
          phase_instructions: |
            [ ] Call get_project_plan(issue_number=N) and get_work_context.
                Treat validation as the first branch-wide verification phase after
                the bug-fix implementation cycles are complete.

            [ ] Read the research artifact, design artifact, planning artifact,
                the Approved Strategy, ARCHITECTURE_PRINCIPLES.md,
                and DOCUMENTATION_STANDARD.md before validating the branch.
                Use them as the authoritative baseline for what corrected behavior,
                regression protection, and supported-contract handling implementation
                was supposed to deliver.

            [ ] Use explore_subagent to gather concrete branch-wide validation context.
                Ask it to identify:
                - the planned cycle deliverables, corrected behavior,
                  regression obligations, and exit criteria that implementation
                  should now have satisfied
                - the files, boundaries, helpers, fixtures, and tests most affected
                  by the completed bug-fix cycles
                - the highest-risk regression-sensitive surfaces that still need explicit branch-wide proof
                - the Approved Strategy constraints and supported-contract boundaries that validation
                  must confirm were preserved
                - a live demonstration proposal that reproduces the old failure safely,
                  or the closest observable proof when the old failure cannot be safely recreated
                - residual risks, caveats, or open questions that the validation report
                  should disclose explicitly

            [ ] If the validation context shows that implementation is incomplete,
                contradictory to planning or design, or in conflict with the Approved Strategy,
                stop and raise a blocker.
                Do not redesign, re-plan, or patch implementation from validation.

            [ ] Run full test suite: run_tests(scope='full')
            [ ] Run quality gates: run_quality_gates(scope='branch')

            [ ] Compare the branch-wide validation evidence against:
                - the planned cycle deliverables, corrected behavior,
                  regression obligations, and exit criteria
                - the design decisions that implementation was expected to preserve
                - the Approved Strategy constraints and supported-contract boundaries
                  that implementation was expected to honor
                - the architecture principles materially relevant to this issue
                Record any mismatch explicitly; do not reinterpret the plan to make the branch pass.

            [ ] Build a live demonstration proposal for the user.
                It must include:
                - the smallest safe reproduction path for the corrected behavior
                - exact preconditions and steps
                - what the user should observe now
                - what the user would have observed before, when that comparison is known and safe
                - when the old failure cannot be safely reproduced live,
                  an explicit explanation of why not
                - the closest observable fallback evidence the user can review instead

            [ ] Create or update docs/development/issueN/validation.md.
                Document:
                - validation scope and prerequisites
                - summary verdict
                - full-suite test result
                - branch quality-gate result
                - mapping from planning deliverables or exit criteria to observed evidence
                - corrected behavior, regression, and Approved Strategy alignment
                - the live demonstration proposal or explicit fallback rationale
                - residual risks, caveats, limitations, and follow-up items
                - exact failure evidence when validation is not green

            [ ] Self-check before commit:
                - If run_tests(scope='full') failed, the validation report must say FAIL
                  and include the exact failing scope.
                - If run_quality_gates(scope='branch') failed, the validation report must say FAIL
                  and include the exact failing gate or file scope.
                - If planning, design, corrected behavior, or Approved Strategy alignment cannot be established,
                  do not declare PASS.
                - If the bug cannot be safely demonstrated live,
                  the validation report must explain why and propose the closest observable fallback.
                - Do not hide caveats, soft failures, or incomplete evidence behind a green summary.

