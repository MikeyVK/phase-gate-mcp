            ### Research → Design Hand-over
            #### Scope
            - Issue: #N
            - Bug symptom: <one sentence>

            #### Findings
            - Observed versus expected behavior: <concise comparison>
            - Likely root-cause area: <files, methods, flows, or boundaries involved>
            - Affected surface: <callers, consumers, test suites, fixtures, helpers, and regression-sensitive paths>
            - Architectural constraints: <principles, boundaries, or forbidden approaches>
            - Corrected behavior: <outcome framing for design and planning>

            #### Approved Strategy
