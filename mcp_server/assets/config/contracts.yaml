            required: true
            dir: docs/development
            pattern: issue*/research*.md
        instructions:
          sub_role: researcher
          phase_instructions: |
            [ ] Read the issue: get_issue(issue_number=N).
            [ ] Read ARCHITECTURE_PRINCIPLES.md before drawing conclusions.
            [ ] Read DOCUMENTATION_STANDARD.md before drafting or scaffolding the research document.
            [ ] Use explore_subagent to gather concrete evidence about this bug.
                Ask it to identify:
                - observed failure behavior and relevant code paths
                - likely blast radius, affected callers, affected boundaries,
                  and affected test suites, helpers, and fixtures
                - root cause candidates supported by code evidence
                - architectural constraints and forbidden approaches relevant to the fix
                - any consumers or boundaries where supported contracts versus accidental
                  dependence on faulty behavior may require explicit human choice
                - unknowns that the design phase must resolve

            [ ] Interaction checkpoint: present a short orientation to the user before going deeper.
                Include:
                - current understanding of the bug
                - observed versus expected behavior
                - likely affected surface, including relevant test suites,
                  fixtures, and helpers
                - major unknowns still blocking good research
                Ask whether external research should be included, for example:
                - upstream library or framework behavior
                - protocol, API, or standards documentation
                - known ecosystem issues, release notes, or vendor guidance
                - comparable failure cases or domain references

            [ ] If external research is requested, or if repo-only evidence is insufficient,
                define a narrow external research target before proceeding.
                Clarify:
                - what exact bug symptom or behavior the external research must explain
                - which libraries, protocols, or sources are relevant
                - whether the goal is expected-behavior confirmation, root-cause insight,
                  feasibility insight, or regression-risk discovery
                Do not default to broad web research without a concrete reason.

            [ ] If no external browsing capability is available in the current tool context,
                ask the user for links, names, screenshots, logs, notes, or examples to analyze.
                Do not make broad external claims without traceable sources.

            [ ] Keep the content in-bounds while forming the research nucleus and before scaffolding:
                - Include defect symptoms, context, affected code paths, affected callers,
                  affected test suites, fixtures and helpers, root cause evidence,
                  external references, architectural constraints,
                  supported-contract versus defect-dependence distinctions when materially relevant,
                  assumptions, open questions, regression risks, and corrected behavior
                  as design/planning input.
                - Follow DOCUMENTATION_STANDARD.md for presentation rules,
                  drafting discipline, tables, Mermaid, and diagram format.
                - Exclude chosen fix, implementation details, code or pseudo-code,
                  task breakdown, TDD cycles, estimates, milestones, and exact patch plans.
                - Exclude "we will implement X" style commitments, even when inspired by
                  external examples.

            [ ] Before scaffolding, produce a short research nucleus that is stable enough
                for first-time-right drafting.
                It must contain:
                - the current bug framing
                - observed versus expected behavior
                - reproduction preconditions or failure triggers
                - the likely root-cause area, affected surface,
                  and affected test suites, fixtures, and helpers
                - architectural constraints already visible
                - strategy-sensitive boundaries, consumers, and viable policy options
                  when materially relevant
                - unknowns, assumptions, and regression risks
                - corrected behavior that should inform design or planning

            [ ] Do not scaffold the research document until the research nucleus is stable enough
                for first-time-right drafting.

            [ ] Create the research artifact: scaffold_artifact(artifact_type='research', name='research', context={..., 'approved_strategy': '...', 'expected_results': '...'}).
            [ ] Fill the scaffolded document with evidence-backed content.
                Use the template's optional sections where they materially improve the research.
                Follow DOCUMENTATION_STANDARD.md while drafting the document.

            [ ] Self-check before finalizing:
                - If a statement sounds like a chosen fix, implementation instruction,
                  test plan, or plan commitment, move it out of research.
                - Treat external findings as evidence, not as decisions.
                - If strategy-sensitive boundaries are in scope, present options and a recommendation
                  as decision input, not as a chosen policy.
                - Verify the research closes with an Approved Strategy entry,
                  even if it records that no special migration policy is needed
                  beyond preserving supported contracts.
                - Prefer concrete evidence over general statements: cite specific files,
                  symbols, behaviors, logs, and references where possible.
                - Verify the draft follows DOCUMENTATION_STANDARD.md.
            [ ] Interaction checkpoint before commit: present the root-cause framing,
