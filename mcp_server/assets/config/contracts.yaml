                - residual caveats or limitations that remain visible in the docs

            [ ] Self-check before commit:
                - behavioral claims trace back to validation evidence
                - stale examples, commands, diagrams, prompts, links, or navigation are not silently outdated
                - reviewed-but-unchanged docs are intentional and defensible
                - the documentation follows DOCUMENTATION_STANDARD.md

