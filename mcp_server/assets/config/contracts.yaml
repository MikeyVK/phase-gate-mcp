merge_policy:
  pr_allowed_phase: ready
  branch_local_artifacts:
    - path: .phase-gate/state.json
      reason: "MCP workflow state — branch-local, must never reach main"
    - path: .phase-gate/deliverables.json
      reason: "MCP workflow deliverables — branch-local, must never reach main"
    - path: .phase-gate/quality_state.json
      reason: "QA baseline state — branch-local, must never reach main"

workflows:
  feature:
    phases:
      - name: research
        exit_requires:
          - id: research-doc
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/research*.md
        instructions:
          sub_role: researcher
          phase_instructions: |
            [ ] Read the issue: get_issue(issue_number=N).
            [ ] Read ARCHITECTURE_PRINCIPLES.md before drawing conclusions.
            [ ] Read DOCUMENTATION_STANDARD.md before drafting or scaffolding the research document.
            [ ] Use explore_subagent to gather concrete evidence about this feature.
                Ask it to identify:
                - current behavior and relevant code paths
                - likely blast radius, including affected test suites,
                  test helpers, and fixtures
                - existing patterns or prior art worth reusing
                - architectural constraints and forbidden approaches
                - any strategy-sensitive boundaries or consumers whose compatibility
                  or migration policy may need explicit human choice
                - unknowns that the design phase must resolve

            [ ] Interaction checkpoint: present a short orientation to the user before going deeper.
                Include:
                - current understanding of the problem
                - likely blast radius, including affected test suites,
                  helpers, and fixtures
                - key architectural constraints already visible
                - major unknowns still blocking good research
                Ask whether external research should be included, for example:
                - competitor behavior or product workflows
                - prior art in the wider ecosystem
                - external libraries, protocols, or standards
                - domain references, regulations, or published guidance

            [ ] If external research is requested, or if repo-only evidence is insufficient,
                define a narrow external research target before proceeding.
                Clarify:
                - what exact question the external research must answer
                - which sources or competitors are relevant
                - whether the goal is inspiration, parity analysis, feasibility insight,
                  domain understanding, or risk discovery
                Do not default to broad web research without a concrete reason.

            [ ] If no external browsing capability is available in the current tool context,
                ask the user for links, names, screenshots, notes, or examples to analyze.
                Do not make broad external claims without traceable sources.

            [ ] Keep the content in-bounds while forming the research nucleus and before scaffolding:
                - Include investigation findings, context, patterns, external references,
                  competitor observations, architectural constraints, test-suite impact,
                  strategy-sensitive boundaries and consumers when materially relevant,
                  assumptions, open questions, risks, and expected results as design/planning input.
                - Follow DOCUMENTATION_STANDARD.md for presentation rules,
                  drafting discipline, tables, Mermaid, and diagram format.
                - Exclude chosen design, implementation details, code or pseudo-code,
                  task breakdown, TDD cycles, estimates, milestones, and test execution plans.
                - Exclude "we will implement X" style commitments, even when inspired by
                  external examples.

            [ ] Before scaffolding, produce a short research nucleus that is stable enough
                for first-time-right drafting.
                It must contain:
                - the current problem framing
                - the likely blast radius, including affected test suites,
                  helpers, and fixtures
                - reusable patterns or prior art
                - architectural constraints already visible
                - strategy-sensitive boundaries, consumers, and viable policy options
                  when materially relevant
                - unknowns, assumptions, and risks
                - expected results that should inform design or planning

            [ ] Do not scaffold the research document until the research nucleus is stable enough
                for first-time-right drafting.

            [ ] Create the research artifact: scaffold_artifact(artifact_type='research', name='research', context={..., 'approved_strategy': '...', 'expected_results': '...'}).
            [ ] Fill the scaffolded document with evidence-backed content.
                Use the template's optional sections where they materially improve the research.
                Follow DOCUMENTATION_STANDARD.md while drafting the document.

            [ ] Self-check before finalizing:
                - If a statement sounds like a design decision, implementation instruction,
                  or plan commitment, move it out of research.
                - Treat external findings as evidence, not as decisions.
                - If strategy-sensitive boundaries are in scope, present options and a recommendation
                  as decision input, not as a chosen policy.
                - Verify the research closes with an Approved Strategy entry,
                  even if it records that no special migration policy is needed
                  beyond preserving supported contracts.
                - Prefer concrete evidence over general statements: cite specific files,
                  symbols, behaviors, and references where possible.
                - Verify the draft follows DOCUMENTATION_STANDARD.md.
            [ ] Interaction checkpoint before commit: present key findings, unresolved questions,
                any scope concerns, and any strategy-sensitive boundaries requiring approval to the user.
                If strategy-sensitive boundaries are in scope, ask the user to choose the policy
                per relevant boundary and capture the result in the research document as Approved Strategy.
                If no special policy is needed, capture that explicitly as the Approved Strategy
                before committing.
                If research suggests the issue should be reframed, narrowed, or split,
                stop and ask before committing.

            [ ] Commit: git_add_or_commit(workflow_phase='research', message='Research findings (#N)')
            [ ] First push: git_push(set_upstream=True)  # creates remote tracking branch; do once on this branch
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Research → Design Hand-over
            #### Scope
            - Issue: #N
            - Research focus: <one sentence>

            #### Findings
            - Blast radius: <production files, test files, helpers, fixtures, modules, and flows likely affected>
            - Existing patterns / prior art: <what should be reused or considered>
            - Architectural constraints: <principles, boundaries, or forbidden approaches>
            - Expected results: <outcome framing for design and planning>

            #### Approved Strategy
            - Boundary / consumer scope: <affected boundaries and consumers, or 'no special migration policy required'>
            - Selected strategy: <preserve compatibility | temporary bridge | clean break>
            - Rationale: <why this policy was chosen>
            - Constraints for later phases: <what design and planning must respect>

            #### Open Questions
            - <question that design must resolve>

            #### Files
            - docs/development/issueN/research.md (new)
            #### Stop-Go Proof
            - Research doc committed
      - name: design
        exit_requires:
          - id: design-doc
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/design*.md
        instructions:
          sub_role: designer
          phase_instructions: |
            [ ] Read the research artifact, the research hand-over,
                and the Approved Strategy from the previous phase.
            [ ] Read ARCHITECTURE_PRINCIPLES.md before making design decisions.
            [ ] Read DOCUMENTATION_STANDARD.md before drafting or scaffolding the design document.
            [ ] Use explore_subagent to gather concrete evidence about this feature design.
                Ask it to identify:
                - existing implementation patterns, interfaces, and boundaries that should be reused
                - candidate insertion points, affected modules, downstream call sites,
                  and affected test suites, helpers, and fixtures
                - architectural constraints and forbidden approaches relevant to this feature
                - design options that appear viable versus risky in this codebase
                - the technical consequences of the Approved Strategy for interfaces,
                  boundaries, and validation obligations
                - unknowns that planning or implementation would otherwise discover too late

            [ ] Interaction checkpoint: present the design framing to the user before going deeper.
                Include:
                - current understanding of the feature goal
                - the Approved Strategy and the constraints it imposes on design
                - likely design options or directions within that strategy
                - key architectural constraints already visible
                - highest-risk boundaries, interfaces, or flows
                - major unknowns still blocking a sound design
                Ask whether any product preference, business rule, or trade-off priority
                should influence the design.

            [ ] If research left unresolved questions that require external comparison,
                define a narrow external research target before proceeding.
                Clarify:
                - what exact design question the external research must answer
                - which sources, products, libraries, protocols, or references are relevant
                - whether the goal is parity analysis, workflow comparison, feasibility insight,
                  domain understanding, or risk discovery
                Do not default to broad web research without a concrete reason.

            [ ] If no external browsing capability is available in the current tool context,
                ask the user for links, examples, screenshots, notes, or references to analyze.
                Do not make broad external claims without traceable sources.

            [ ] Keep the design in-bounds while forming the design nucleus and before scaffolding:
                - Include option comparison, chosen direction, rationale, affected interfaces,
                  affected test suites, helpers, fixtures, data flows,
                  architectural constraints, the Approved Strategy and its constraints,
                  design-level validation strategy, assumptions, open questions, risks,
                  and planning-relevant consequences.
                - Exclude production implementation code, file-by-file patch plans,
                  task breakdown, TDD cycles, estimates, milestones, and commit sequencing.
                - Exclude architecture redefinition unless the issue reveals a stable
                  system-level concept that truly belongs in architecture.md; if so,
                  flag it explicitly instead of silently absorbing it into the feature design.
                - Exclude policy re-decisions about preserve compatibility,
                  temporary bridge, or clean break. If new evidence makes the Approved Strategy
                  unsound, stop and reopen the decision explicitly instead of redesigning by stealth.
                - Exclude "we will implement X in file Y" style commitments.
                - Do not invent ADRs or assume an ADR process exists for this project.

            [ ] Before scaffolding, produce a short design nucleus that is stable enough
                for first-time-right drafting.
                It must contain:
                - the refined problem statement and design goal
                - the Approved Strategy and the constraints it imposes
                - the viable design options and trade-offs within that strategy
                - the preferred design direction and rationale
                - affected interfaces, boundaries, data flows, integration points,
                  and affected test suites, fixtures, and helpers
                - compatibility constraints, failure modes, and major risks
                - design-level validation strategy: what implementation and planning must prove
                - open questions, assumptions, and planning-relevant consequences

            [ ] Do not scaffold the design document until the design nucleus is stable enough
                for first-time-right drafting.

            [ ] Create the design artifact: scaffold_artifact(artifact_type='design', name='design').
            [ ] Fill the scaffolded document with evidence-backed content.
                Use the template's optional sections where they materially improve the design.
                Follow DOCUMENTATION_STANDARD.md while drafting the document.

            [ ] Self-check before the final user checkpoint:
                - Every major design decision must have a rationale and at least one rejected alternative.
                - Reject options that conflict with ARCHITECTURE_PRINCIPLES.md.
                - Reject any direction that conflicts with the Approved Strategy.
                - If a statement sounds like planning or implementation, move it out of design.
                - Prefer concrete evidence over general statements: cite specific files,
                  symbols, boundaries, and flows where possible.
                - Verify the draft follows DOCUMENTATION_STANDARD.md.

            [ ] Interaction checkpoint before internal QA: present the chosen design,
                rejected alternatives, Approved Strategy alignment, critical trade-offs,
                interface impacts, and unresolved questions to the user.
                If the trade-off priorities or direction are wrong, revise before review.

            [ ] Internal QA checkpoint before commit: invoke the qa agent with sub-role design-reviewer
                to review the design.
                Ask QA as design-reviewer to verify:
                - alignment with the research artifact, research hand-over, and Approved Strategy
                - compliance with ARCHITECTURE_PRINCIPLES.md
                - compliance with DOCUMENTATION_STANDARD.md
                - the design stays within design-phase scope
                - the design operationalizes the Approved Strategy without silently changing it
                - the chosen direction, including affected test suites and validation obligations,
                  is justified and usable by the planning phase
                Return PASS or FAIL with exact gaps.
                If model selection is supported in the current environment,
                prefer a model different from the active implementation agent.

            [ ] If internal QA returns FAIL, revise the design and repeat the same QA checkpoint
                before committing.

            [ ] Commit: git_add_or_commit(workflow_phase='design', message='Design for #N')
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Design → QA Hand-over
            #### Scope
            - Issue: #N
            - Design focus: <one sentence>

            #### Review Targets
            - Chosen direction: <one sentence>
            - Approved Strategy alignment: <how the design stays within the chosen policy>
            - Research alignment: <which findings materially shaped the design>
            - Interface / boundary impact: <what planning and implementation, including the test suite, must account for>
            - Planning consequences: <what the next phase must preserve, prove, or split>
            - Open questions: <what remains unresolved>

            #### Files
            - docs/development/issueN/design.md (new)
      - name: planning
        exit_requires:
          - id: planning-doc
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/planning*.md
        instructions:
          sub_role: planner
          phase_instructions: |
            [ ] Read the design artifact, the design hand-over, and the Approved Strategy from the previous phases.
            [ ] Read DOCUMENTATION_STANDARD.md before drafting or scaffolding the planning document.
            [ ] Read ARCHITECTURE_PRINCIPLES.md before fixing cycle boundaries,
                dependencies, or implementation obligations.
            [ ] Read TYPE_CHECKING_PLAYBOOK.md before defining typing or static-analysis
                obligations for the implementation phase.
            [ ] Use explore_subagent to gather concrete evidence about how this feature
                should be sliced into implementation cycles.
                Ask it to identify:
                - the smallest safe implementation slices implied by the approved design
                - affected production modules, test suites, fixtures, and helpers per slice
                - sequencing constraints, dependency edges, and risky boundaries between slices
                - architectural, typing, and quality obligations each slice must preserve
                - the execution consequences of the Approved Strategy for validation,
                  sequencing, bridge use, cutover steps, or cleanup when applicable
                - unknowns that would make the implementation phase discover planning mistakes too late

            [ ] Interaction checkpoint: present the planning framing to the user before going deeper.
                Include:
                - the proposed cycle strategy and likely cycle count
                - the Approved Strategy and the constraints it imposes on implementation
                - the highest-risk boundaries, dependencies, and sequencing constraints
                - expected production and test-suite impact
                - expected typing and quality-gate obligations
                - major unknowns still blocking a sound plan
                Ask whether any delivery, sequencing, or risk trade-off priority
                should influence the cycle breakdown.

            [ ] Keep the planning in-bounds while forming the planning nucleus and before scaffolding:
                - Include sequential cycle decomposition, scope boundaries, dependencies,
                  per-cycle deliverables, per-cycle exit criteria, validation obligations,
                  test-suite impact, typing expectations, quality-gate expectations,
                  Approved Strategy constraints, assumptions, open questions, risks,
                  and out-of-scope notes.
                - Treat production code, test files, fixtures, and helpers as equally relevant
                  planning surfaces when defining blast radius and validation obligations.
                - Translate the Approved Strategy into execution boundaries, validation,
                  bridge or cutover steps, and cleanup only when that strategy requires them.
                - Do not compare or choose preserve compatibility, temporary bridge,
                  or clean break in planning.
                - If the Approved Strategy is missing, ambiguous, internally contradictory,
                  or appears technically unsound, stop and activate a human-in-the-loop checkpoint
                  instead of re-deciding strategy inside planning.
                - Make quality gates explicit for the implementation phase, especially during
                  REFACTOR, and apply them to changed production and test files.
                - Exclude redesign, new research, production implementation code,
                  line-by-line patch plans, exact commit messages, and milestone management.
                - Exclude "we will edit line X in file Y" style commitments.

            [ ] Before scaffolding, produce a short planning nucleus that is stable enough
                for first-time-right drafting.
                It must contain:
                - the approved design direction that implementation must preserve
                - the Approved Strategy constraints that implementation must respect
                - the proposed sequential cycles and why each boundary exists
                - expected production and test-suite changes per cycle
                - deliverable ids and exit criteria per cycle
                - architecture, typing, and quality obligations per cycle
                - dependencies, assumptions, open questions, and highest-risk slices

            [ ] Do not scaffold the planning document until the planning nucleus is stable enough
                for first-time-right drafting.

            [ ] Create the planning artifact: scaffold_artifact(artifact_type='planning', name='planning').
            [ ] Fill the scaffolded document with evidence-backed content.
                Use the template's optional sections where they materially improve the plan.
                Follow DOCUMENTATION_STANDARD.md while drafting the document.
                Keep the planning document aligned with the structured payload that will be saved
                through save_planning_deliverables.

            [ ] Build the save_planning_deliverables payload from the finalized plan.
                Ensure:
                - cycles.total equals the number of cycles
                - cycle_number values are sequential and 1-based
                - every cycle has a non-empty deliverables list
                - every cycle has a non-empty exit_criteria string
                - deliverable ids are stable and specific enough for later updates or validation
                - cycle deliverables cover both production and test artifacts where both are affected

            [ ] Save deliverables: save_planning_deliverables(issue_number=N, planning_deliverables={...})

            [ ] Self-check before the final user checkpoint:
                - If the plan exposes a contradiction, scope error, redesign need,
                  or an unusable Approved Strategy, stop and activate a human-in-the-loop checkpoint.
                  Do not edit design artifacts from planning.
                - If a cycle is too large for one RED → GREEN → REFACTOR slice,
                  split it before finalizing.
                - Verify that test-suite impact, typing obligations, quality-gate expectations,
                  and Approved Strategy execution constraints are explicit where they matter.
                - Verify the draft follows DOCUMENTATION_STANDARD.md.
                - Verify the saved payload matches the document's cycle structure and ids.

            [ ] Interaction checkpoint before internal QA: present the cycle breakdown,
                validation strategy, test-suite impact, typing and gate obligations,
                Approved Strategy execution consequences, and unresolved questions to the user.
                If the boundaries or priorities are wrong, revise before review.

            [ ] Internal QA checkpoint before commit: invoke the qa agent with sub-role plan-verifier
                to review the plan.
                Ask QA as plan-verifier to verify:
                - alignment with the design artifact, design hand-over, and Approved Strategy
                - the cycle boundaries are sequential, implementation-sized,
                  and do not hide redesign inside planning
                - test-suite impact, typing obligations, quality-gate expectations,
                  and Approved Strategy execution constraints are explicit
                - the save_planning_deliverables payload matches the document's cycle structure and ids
                - the plan stays within planning-phase scope and is usable by the implementation phase
                Return PASS or FAIL with exact gaps.
                If model selection is supported in the current environment,
                prefer a model different from the active implementation agent.

            [ ] If internal QA returns FAIL, revise the plan and repeat the same QA checkpoint
                before committing.
            [ ] Commit: git_add_or_commit(workflow_phase='planning', message='Planning for #N')
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Planning → QA Hand-over
            #### Scope
            - Issue: #N
            - Cycles planned: <N>
            - Planning focus: <one sentence>

            #### Review Targets
            - Cycle strategy: <how the feature was split and why>
            - Design alignment: <which design constraints the plan preserves>
            - Approved Strategy alignment: <which strategy constraints the plan operationalizes>
            - Test / validation strategy: <what implementation must prove, including test-suite, typing, quality-gate, and strategy-driven execution obligations>
            - Highest-risk cycles / dependencies: <where sequencing matters most>
            - Open questions: <what remains unresolved>

            #### Files
            - docs/development/issueN/planning.md (new)

            #### Stop-Go Proof
            - Planning doc committed
            - save_planning_deliverables(...) persisted successfully
      - name: implementation
        cycle_based: true
        subphases: [red, green, refactor]
        commit_type_map:
          red: test
          green: feat
          refactor: refactor
        exit_requires: []
        instructions:
          sub_role: implementer
          phase_instructions: |
            [RULES]
            - MAX 1-2 short sentences before ANY tool call (e.g., "Adding test X. Calling run_tests.").
            - NO long reasoning. NO explanations. NO conversational filler.
            - USE TODOs

            [WORKFLOW]
            1. Call get_project_plan(issue_number=N) & get_work_context. Identify active cycle. Execute ONLY active cycle. NO scope creep.
            
            2. Call explore_subagent for active cycle pre-implementation context. Require:
              - Orientation & prerequisites
              - Constraints & Approved Strategy
              - RED scope: tests & intended failure
              - GREEN checklist: prod/imports/fixtures/helpers/call-sites
              - REFACTOR scope
              - Deliverables, exit criteria, out-of-scope items
            
            3. If context missing/conflicting with plan/strategy: STOP. Raise blocker. NO redesign/replanning.
            
            4. Prod, tests, fixtures = equal quality/typing. If typing errors: read TYPE_CHECKING_PLAYBOOK.md. Fix everywhere.
            
            5. TDD Loop:
              [RED]
              - Write active-cycle tests ONLY.
              - Call run_tests(path='<test_file>::<class>::<method>'). Confirm INTENDED failure.
              - Call git_add_or_commit(workflow_phase='implementation', sub_phase='red', cycle_number=N, message='...')
              
              [GREEN]
              - Implement context-listed changes ONLY (incl. imports/fixtures).
              - Call run_tests incrementally. Pass ALL active-cycle tests.
              - Call git_add_or_commit(..., sub_phase='green', ...)
              
              [REFACTOR]
              - Clean active-cycle scope ONLY.
              - Call run_tests.
              - Call run_quality_gates(scope='files', files=['<changed_files>']).
              - If changed: Call git_add_or_commit(..., sub_phase='refactor', ...)
            
            6. QA Checkpoint: Call QA sub-agent. Config: model=GPT-5.4, reasoning=medium.
              Payload: Cycle context, changed files, tests, test-results, claimed deliverables.
              Enforce strict Micro-CoT prompt on sub-agent:
              "ROLE: Ruthless Auditor. Prevent scope creep. NO conversation.
              OUTPUT FORMAT EXACTLY AS FOLLOWS:
              Scope: OK|FAIL
              Deliverables: OK|FAIL
              Unplanned: OK|FAIL
              Strategy: OK|FAIL
              Tests: OK|FAIL
              JSON: {\"status\": \"PASS|FAIL\", \"gaps\": [\"gap description\"]}"
            
            7. Resolution:
              - If QA JSON status=FAIL: Fix gaps, rerun affected step, REPEAT QA.
              - If QA JSON status=PASS & cycles remain: Call transition_cycle(to_cycle=N+1) -> get_work_context -> REPEAT from step 2.
              - If QA JSON status=PASS & NO cycles remain: Output concise summary (cycles, files, tests, deliverables). STOP. Await user instruction. DO NOT call transition_phase.
      - name: validation
        exit_requires:
          - id: validation-report
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/validation*.md
        instructions:
          sub_role: validator
          phase_instructions: |
            [ ] Call get_project_plan(issue_number=N) and get_work_context.
                Treat validation as the first branch-wide verification phase after
                the implementation cycles are complete.

            [ ] Read the research artifact, design artifact, planning artifact,
                the Approved Strategy, ARCHITECTURE_PRINCIPLES.md,
                and DOCUMENTATION_STANDARD.md before validating the branch.
                Use them as the authoritative baseline for what implementation
                was supposed to deliver and what the validation report must prove.

            [ ] Use explore_subagent to gather concrete branch-wide validation context.
                Ask it to identify:
                - the planned cycle deliverables and exit criteria that implementation
                  should now have satisfied
                - the files, boundaries, helpers, fixtures, and tests most affected
                  by the completed implementation cycles
                - the highest-risk surfaces that still need explicit branch-wide proof
                - the design constraints and Approved Strategy constraints that validation
                  must confirm were preserved
                - a live demonstration proposal for the new behavior,
                  or the closest observable fallback when no true live path exists
                - residual risks, caveats, or open questions that the validation report
                  should disclose explicitly

            [ ] If the validation context shows that implementation is incomplete,
                contradictory to planning or design, or in conflict with the Approved Strategy,
                stop and raise a blocker.
                Do not redesign, re-plan, or patch implementation from validation.

            [ ] Run full test suite: run_tests(scope='full')
            [ ] Run quality gates: run_quality_gates(scope='branch')

            [ ] Compare the branch-wide validation evidence against:
                - the planned cycle deliverables and exit criteria
                - the design decisions that implementation was expected to preserve
                - the Approved Strategy constraints that implementation was expected to honor
                - the architecture principles materially relevant to this issue
                Record any mismatch explicitly; do not reinterpret the plan to make the branch pass.

            [ ] Build a live demonstration proposal for the user.
                It must include:
                - the smallest observable behavior change that can be demonstrated safely
                - exact preconditions and steps
                - what the user should observe now
                - what the user would have observed before, when that comparison is known and useful
                - when no true live path exists, an explicit explanation of why not
                - the closest observable fallback evidence the user can review instead

            [ ] Create or update docs/development/issueN/validation.md.
                Document:
                - validation scope and prerequisites
                - summary verdict
                - full-suite test result
                - branch quality-gate result
                - mapping from planning deliverables or exit criteria to observed evidence
                - design and Approved Strategy alignment
                - the live demonstration proposal or explicit fallback rationale
                - residual risks, caveats, limitations, and follow-up items
                - exact failure evidence when validation is not green

            [ ] Self-check before commit:
                - If run_tests(scope='full') failed, the validation report must say FAIL
                  and include the exact failing scope.
                - If run_quality_gates(scope='branch') failed, the validation report must say FAIL
                  and include the exact failing gate or file scope.
                - If planning, design, or Approved Strategy alignment cannot be established,
                  do not declare PASS.
                - If the behavior is not practically demoable live,
                  the validation report must explain why and propose the closest observable fallback.
                - Do not hide caveats, soft failures, or incomplete evidence behind a green summary.

            [ ] Commit: git_add_or_commit(workflow_phase='validation', message='Validation for #N')
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Validation → QA Hand-over
            #### Scope
            - Issue: #N
            - Validation focus: <branch-wide verification after implementation cycles>

            #### Review Targets
            - Full-suite result: <summary of run_tests(scope='full')>
            - Branch gate result: <summary of run_quality_gates(scope='branch')>
            - Planning alignment: <which planned deliverables and exit criteria are now evidenced>
            - Design / Approved Strategy alignment: <which constraints were preserved or where mismatches remain>
            - Live demonstration proposal: <how the user can observe the new behavior or the closest safe fallback>
            - Residual risks / caveats: <what remains important for QA to examine>

            #### Files
            - docs/development/issueN/validation.md (new or updated)

            #### Stop-Go Proof
            - Tests: run_tests(scope='full') → <result>
            - Gates: run_quality_gates(scope='branch') → <result>
            - Verdict: PASS | FAIL
      - name: documentation
        instructions:
          sub_role: documenter
          phase_instructions: |
            [ ] Call get_project_plan(issue_number=N) and get_work_context.
                Treat documentation as the docs-workspace reconciliation and close-out phase after validation.

            [ ] Read docs/development/issueN/validation.md
                and DOCUMENTATION_STANDARD.md before editing documentation.
                Use validation as the authoritative source for behavior claims and observed outcomes.
                Treat docs/development/issueN/*.md, archived docs, and other historical workflow artifacts
                as context by default, not active documentation.
                Update them only when validation explicitly requires it,
                they are the authoritative deliverable for the current phase,
                or the user explicitly asks for it.

            [ ] Use explore_subagent to scan the documentation workspace for surfaces affected by this issue.
                Ask it to identify:
                - active repository documentation, READMEs, standards, reference pages, prompts, runbooks,
                  and navigation surfaces affected by the delivered change
                - issue-local, archived, or historical artifacts that may provide context
                  but should normally remain unchanged
                - stale examples, commands, diagrams, screenshots, and cross-links
                - docs that were reviewed and can remain unchanged
                - the smallest safe set of documentation updates needed to leave the workspace coherent

            [ ] Update or create the relevant documentation files.
                Prioritize:
                - existing user, operator, and developer documentation that now needs to reflect the delivered change
                - stale examples, commands, diagrams, screenshots, prompts, links, and navigation
                - issue-local workflow artifacts only when validation explicitly requires a correction,
                  they are the authoritative deliverable for the current phase,
                  or the user explicitly asks for it

            [ ] Keep the documentation coherent across the docs workspace:
                - every behavioral claim must trace back to validation evidence
                - surrounding explanatory text, links, navigation, and examples should be brought back in sync
                  with the delivered change
                - record which docs surfaces were updated and which were reviewed and left unchanged
                - if the docs scan reveals a gap that needs a new finding, a new scope decision,
                  or newly deferred work, stop and raise a blocker for human review
            [ ] Prepare the Documentation → QA hand-over.
