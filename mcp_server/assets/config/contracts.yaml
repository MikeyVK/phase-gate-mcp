                - the technical consequences of the Approved Strategy for shared contracts,
                  workstream boundaries, and coordination constraints
                - unknowns that coordination or child implementations would otherwise discover too late

            [ ] Interaction checkpoint: present the epic design framing to the user before going deeper.
                Include:
                - current understanding of the epic outcome and decomposition
                - the Approved Strategy and the constraints it imposes on design
                - cross-issue boundaries, shared contracts,
                  and shared test obligations already visible
                - likely integration risks, sequencing constraints, stakeholder surfaces,
                  and affected integration or acceptance suites
                - major unknowns still blocking a coherent epic design
                Ask whether any business, delivery, or organizational constraint
                should influence the design.

            [ ] If research or planning left unresolved questions that require external comparison,
                define a narrow external research target before proceeding.
                Clarify:
                - what exact system, dependency, or interface question the external research must answer
                - which sources, products, libraries, protocols, or references are relevant
                - whether the goal is parity analysis, feasibility insight,
                  domain understanding, or risk discovery
                Do not default to broad web research without a concrete reason.

            [ ] If no external browsing capability is available in the current tool context,
                ask the user for links, examples, screenshots, notes, or references to analyze.
                Do not make broad external claims without traceable sources.

            [ ] Keep the design in-bounds while forming the design nucleus and before scaffolding:
                - Include cross-workstream option comparison, chosen epic direction, rationale,
                  shared interfaces and contracts, shared test obligations, system boundaries,
                  sequencing assumptions, integration points, dependency rules,
                  the Approved Strategy and its constraints,
                  design-level validation strategy, assumptions, open questions, risks,
                  and coordination-relevant consequences.
                - Include epic-wide architectural implications when they are stable and central,
                  but flag anything that should migrate to architecture.md instead of silently
                  mixing long-lived architecture with feature-level guidance.
                - Exclude child-issue implementation details, file-by-file patch plans,
                  per-issue TDD cycles, estimates, milestone management, issue triage,
                  and ongoing coordination actions.
                - Exclude policy re-decisions about preserve compatibility,
                  temporary bridge, or clean break. If new evidence makes the Approved Strategy
                  unsound, stop and reopen the decision explicitly instead of redesigning by stealth.
                - Exclude "child issue X will implement file Y" style commitments.
                - Do not invent ADRs or assume an ADR process exists for this project.

            [ ] Before scaffolding, produce a short design nucleus that is stable enough
                for first-time-right drafting.
                It must contain:
                - the refined epic design goal and target operating model
                - the Approved Strategy and the constraints it imposes
                - the viable cross-workstream design options and trade-offs within that strategy
                - the preferred epic direction and rationale
                - shared interfaces, boundaries, cross-issue contracts,
                  and shared test obligations
                - sequencing constraints, dependency rules, and integration points
                - compatibility constraints, failure modes, and major risks
                - design-level validation strategy: what child issues and coordination must prove
                - open questions, assumptions, and coordination-relevant consequences

            [ ] Do not scaffold the design document until the design nucleus is stable enough
                for first-time-right drafting.

            [ ] Create the design artifact: scaffold_artifact(artifact_type='design', name='design').
            [ ] Fill the scaffolded document with evidence-backed content.
                Use the template's optional sections where they materially improve the design.
                Follow DOCUMENTATION_STANDARD.md while drafting the document.

            [ ] Self-check before the final user checkpoint:
                - Every major design decision must be usable by child issues and coordination,
                  not only by a single implementation slice.
                - Reject options that conflict with ARCHITECTURE_PRINCIPLES.md.
                - Reject any direction that conflicts with the Approved Strategy.
                - If a statement sounds like issue triage, detailed planning, or implementation,
                  move it out of design.
                - Prefer concrete evidence over general statements: cite specific systems,
                  interfaces, boundaries, issues, flows, and shared test suites where possible.
                - Verify the draft follows DOCUMENTATION_STANDARD.md.

            [ ] Interaction checkpoint before internal QA: present the chosen epic direction,
                rejected alternatives, Approved Strategy alignment, child-issue impacts,
                sequencing constraints, and unresolved architectural questions to the user.
                If the trade-off priorities or direction are wrong, revise before review.

            [ ] Internal QA checkpoint before commit: invoke the qa agent with sub-role design-reviewer
                to review the epic design.
                Ask QA as design-reviewer to verify:
                - alignment with the research artifact, planning artifact, planning hand-over,
                  and Approved Strategy
                - compliance with ARCHITECTURE_PRINCIPLES.md
                - compliance with DOCUMENTATION_STANDARD.md
                - the design stays at epic/system boundary instead of collapsing
                  into child-issue implementation details
                - the design operationalizes the Approved Strategy without silently changing it
                - shared contracts, coordination implications, and sequencing assumptions are explicit
                - the chosen direction is justified and coherent across child issues
                Return PASS or FAIL with exact gaps.
                If model selection is supported in the current environment,
                prefer a model different from the active implementation agent.

            [ ] If internal QA returns FAIL, revise the design and repeat the same QA checkpoint
                before committing.

            [ ] Commit: git_add_or_commit(workflow_phase='design', message='Design for #N')
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Design → QA Hand-over
            #### Scope
            - Epic: #N
            - Design focus: <one sentence>

            #### Review Targets
            - Epic direction: <one sentence>
            - Approved Strategy alignment: <how the design respects the chosen policy>
            - Planning alignment: <which child-issue or workstream decisions materially shaped the design>
            - Shared contracts / boundaries: <what child issues, coordination, and shared test suites must align on>
            - Sequencing / coordination impact: <what ordering, dependency, or governance constraints matter next>
            - Open questions: <what remains unresolved>

            #### Files
            - docs/development/issueN/design.md (new)
      - name: coordination
        exit_requires: []
        instructions:
          sub_role: epic-coordinator
          phase_instructions: |
            [ ] Review all child issues and their current status.
            [ ] Update priorities, dependencies, and epic-level blockers where needed.
            [ ] Coordinate child-work hand-offs, user checkpoints, and QA follow-up as needed.
            [ ] Document coordination notes.
            [ ] Produce hand-over.
          handover_template: |
            ### Coordination Hand-over
            #### Scope
            - Epic: #N
            - Sub-issues reviewed: <list>
            #### Stop-Go Proof
            - Sub-issues in expected states
      - name: documentation
        instructions:
          sub_role: epic-documenter
          phase_instructions: |
            [ ] Call get_project_plan(issue_number=N) and get_work_context.
                Treat documentation as the epic docs-workspace reconciliation and close-out phase after
                planning, design, and coordination work are complete.

            [ ] Read the planning artifact, design artifact,
                coordination notes or outputs, and DOCUMENTATION_STANDARD.md
                before editing documentation.
                Use them as the authoritative baseline for epic-level outcomes,
                shared boundaries, and communication surfaces.
                Treat child-issue artifacts, archived docs, and historical coordination notes
                as context by default, not active documentation.
                Update them only when they are current authoritative epic deliverables,
                planning or coordination explicitly requires the correction,
                or the user explicitly asks for it.

            [ ] Use explore_subagent to scan the epic-level documentation workspace for surfaces affected by this issue.
                Ask it to identify:
                - epic-level docs, overview docs, shared contract docs, rollout notes,
                  stakeholder guidance, and current coordination docs that need final alignment
                - child-issue, archived, or historical artifacts that may provide context
                  but should normally remain unchanged
                - stale examples, diagrams, decomposition summaries, screenshots, and cross-links
                - docs that were reviewed and can remain unchanged
                - the smallest safe set of documentation updates needed to leave epic-level docs coherent

            [ ] Update or create the relevant epic-level documentation files.
                Prioritize:
                - shared overview or coordination docs that explain the epic outcome
                - docs that describe shared contracts, boundaries, or rollout expectations
                - diagrams, decomposition notes, links, and stakeholder guidance that would otherwise be stale

            [ ] Keep the documentation coherent across the epic documentation workspace:
                - every epic-level claim must trace back to planning, design, or coordination evidence
                - epic-level docs should stay consistent with child-issue boundaries and shared contracts
                - record which docs surfaces were updated and which were reviewed and left unchanged
                - if the docs scan reveals a gap that needs a new finding, a new scope decision,
                  or newly deferred work, stop and raise a blocker for human review

            [ ] Prepare the Documentation → QA hand-over.
                It must cover:
                - documentation scan coverage across the docs workspace
                - which documentation files were updated and why
                - which documentation surfaces were reviewed and left unchanged, with rationale
                - how the updated docs reflect the epic-level outcome
                - residual caveats or ownership boundaries that remain visible in the docs

            [ ] Self-check before commit:
                - every epic-level claim traces back to planning, design, or coordination evidence
                - epic-level diagrams, decomposition notes, links, and contract explanations do not contradict child-issue boundaries
                - reviewed-but-unchanged docs are intentional and defensible
                - the documentation follows DOCUMENTATION_STANDARD.md

            [ ] Commit: git_add_or_commit(workflow_phase='documentation', message='Documentation for #N')
            [ ] Produce hand-over for QA doc review.
          handover_template: |
            ### Documentation → QA Hand-over
            #### Scope
            - Epic: #N
            - Documentation focus: <what epic-level communication was clarified, corrected, or updated>

            #### Review Targets
            - Docs workspace coverage: <which surfaces were scanned>
            - Planning / design / coordination alignment: <which epic-level outcomes the documentation reflects>
            - Updated docs: <which files changed and why>
            - Reviewed but unchanged: <which surfaces were checked and intentionally left as-is>
            - Residual caveats / ownership boundaries: <what remains visible and intentionally unresolved>

            #### Files
            - docs/... (updated)

            #### Stop-Go Proof
            - Documentation committed
      - name: ready
        instructions:
          sub_role: epic-releaser
          phase_instructions: |
            The branch is ready for PR submission.

            [ ] Call get_project_plan(issue_number=N), get_work_context, and get_issue(issue_number=N).
                Read the planning artifact, design artifact, coordination notes or outputs,
                and the updated epic documentation files that materially support the final PR narrative.

            [ ] Run final quality gate: run_quality_gates(scope='branch')
                If this fails, stop.

            [ ] If .phase-gate/state.json contains the final phase or transition audit trail
                for this branch, commit it before PR preparation.
                Do not leave the last branch audit trail as dirty local state
                just because submit_pr may later neutralize branch-local artifacts.

            [ ] Build the definitive deferred-work transfer from authoritative epic artifacts only.
                For each item capture:
                - concise title
                - why it is explicitly out of scope for this branch
                - source artifact that established the deferral
                - impact if it remains open
                - tracking state: explicit issue reference already present, or CO triage required

            [ ] Keep the deferred-work transfer strict and audit-ready:
                - carry forward only items already established by epic artifacts
                - package the transfer so @co can act without reconstructing the epic branch history
                - leave issue triage and issue-body curation to @co
                - if an item is not actually established by the epic artifacts, stop and raise a blocker

            [ ] Scaffold the PR body with the existing PR template.
                Call scaffold_artifact(artifact_type='pr', name='pr', context={...}).
                Populate at minimum:
                - title: finalized PR title
                - summary: concise epic outcome summary grounded in planning, design, coordination, and updated documentation
                - changes: concise summary of the epic-level branch outcome
                - testing: final gate result actually obtained
                - checklist_items: release-ready checklist entries
                - related_docs: planning, design, and updated epic documentation the reviewer should open
                - closes_issues: [N] when the PR closes the epic issue
                - breaking_changes: only when explicitly supported by authoritative epic artifacts
                - deferred_work: deferred items from authoritative epic artifacts (omit when none)
                - tracking_state: tracking state for deferred items (issue refs or triage notes)

            [ ] Read the scaffolded PR markdown from the returned artifact path
                and use that template output as the body for submit_pr.

            [ ] Verify the original issue body still honestly describes the branch intent and scope:
                - if research broadened or changed scope, update the issue body before PR creation
                - use update_issue(issue_number=N, body="<updated>") when changes are needed

            [ ] Review all issues explicitly in scope: decide which are closure-ready on this branch:
                - for each in-scope issue, decide: close on merge via Closes #N, or explicitly defer
                - encode only closure-ready issues in the PR body via Closes #N

            [ ] Carry deferred work into the PR body as the persistent @imp → @co transfer artifact:
                - populate the PR body with deferred_work and tracking_state scaffold fields
                - the PR body must carry: delivered scope, Closes #N claims, deferred items, tracking state
                - the hand-over template is a completeness check, not a replacement for PR body facts

            [ ] Verify the PR body is complete using the handover template as a completeness check:
                - does the PR body carry: delivered scope, Closes #N claims, deferred items, tracking state?
                - use the hand-over template sections as a gate before calling submit_pr

            [ ] Commit state files before PR: git_add_or_commit(workflow_phase='ready', message='chore: update phase-gate state before PR')
                  Ensures .phase-gate/state.json and any other dirty tracked files are committed.
                  submit_pr requires a clean working tree — this step must always precede it.

            [ ] Submit PR: submit_pr(head='<branch>', title='<title>', body='<scaffolded pr markdown>')
            [ ] Do NOT call merge_pr — human approval required.
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Ready → CO / Merge Hand-over
            #### Scope
            - Epic: #N
            - PR focus: <what the PR packages for merge at epic scope>
            - Deferred transfer focus: <what @co must preserve for follow-up tracking>

            #### Delivery Targets
            - PR body alignment: <which planning, design, coordination, and documentation artifacts the PR body reflects>
            - Template usage: PR body scaffolded via artifact_type='pr'
            - Final gate result: <summary of run_quality_gates(scope='branch')>
            - Deferred work transfer: <items carried forward from authoritative epic artifacts only>
            - Tracking state: <explicit issue refs already present vs CO triage required>

            #### Files
            - docs/development/issueN/planning.md
            - docs/development/issueN/design.md
            - docs/... (updated)

            #### Stop-Go Proof
            - Quality gates: run_quality_gates(scope='branch') → <result>
            - PR body scaffolded: scaffold_artifact(artifact_type='pr', name='pr', context={...})
            - Deferred-work transfer prepared for @co
            - PR submitted (merge requires human approval)
            - PR submitted (merge requires human approval)
