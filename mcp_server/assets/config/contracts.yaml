            [ ] Review all issues explicitly in scope: decide which are closure-ready on this branch:
                - for each in-scope issue, decide: close on merge via Closes #N, or explicitly defer
                - encode only closure-ready issues in the PR body via Closes #N

            [ ] Carry deferred work into the PR body as the persistent @imp → @co transfer artifact:
                - populate the PR body with deferred_work and tracking_state scaffold fields
                - the PR body must carry: delivered scope, Closes #N claims, deferred items, tracking state
                - the hand-over template is a completeness check, not a replacement for PR body facts

            [ ] Verify the PR body is complete using the handover template as a completeness check:
                - does the PR body carry: delivered scope, Closes #N claims, deferred items, tracking state?
                - use the hand-over template sections as a gate before calling submit_pr

            [ ] Commit state files before PR: git_add_or_commit(workflow_phase='ready', message='chore: update phase-gate state before PR')
                  Ensures .phase-gate/state.json and any other dirty tracked files are committed.
                  submit_pr requires a clean working tree — this step must always precede it.

            [ ] Submit PR: submit_pr(head='<branch>', title='<title>', body='<scaffolded pr markdown>')
            [ ] Do NOT call merge_pr — human approval required.
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Ready → CO / Merge Hand-over
            #### Scope
            - Issue: #N
            - PR focus: <what the PR packages for merge>
            - Deferred transfer focus: <what @co must preserve for follow-up tracking>

            #### Delivery Targets
            - PR body alignment: <which validation and documentation artifacts the PR body reflects>
            - Template usage: PR body scaffolded via artifact_type='pr'
            - Final gate result: <summary of run_quality_gates(scope='branch')>
            - Deferred work transfer: <items carried forward from authoritative issue artifacts only>
            - Tracking state: <explicit issue refs already present vs CO triage required>

            #### Files
            - docs/development/issueN/validation.md
            - docs/... (updated)

            #### Stop-Go Proof
            - Quality gates: run_quality_gates(scope='branch') → <result>
            - PR body scaffolded: scaffold_artifact(artifact_type='pr', name='pr', context={...})
            - Deferred-work transfer prepared for @co
            - PR submitted (merge requires human approval)
  refactor:
    phases:
      - name: research
        exit_requires:
          - id: research-doc
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/research*.md
        instructions:
          sub_role: researcher
          phase_instructions: |
            [ ] Read the issue: get_issue(issue_number=N).
            [ ] Read ARCHITECTURE_PRINCIPLES.md before drawing conclusions.
            [ ] Read DOCUMENTATION_STANDARD.md before drafting or scaffolding the research document.
            [ ] Use explore_subagent to gather concrete evidence about this refactor.
                Ask it to identify:
                - current responsibilities, boundaries, and relevant code paths
                - likely blast radius, risky boundaries, dependency edges,
                  and affected test suites, helpers, and fixtures
                - invariants and externally visible behavior that must be preserved
                - architectural tensions, anti-patterns, or forbidden approaches
                - any boundaries where preservation may be insufficient and an explicit
                  compatibility or migration policy may be required
                - candidate seams that planning can use to split the refactor safely

            [ ] Interaction checkpoint: present a short orientation to the user before going deeper.
                Include:
                - current understanding of the refactor goal
                - behavior and invariants that appear to require preservation
                - risky boundaries or high-coupling areas
                - major unknowns still blocking good research
                Ask whether external research should be included, for example:
                - framework or language-level refactor idioms
                - migration strategies for similar code shapes
                - library guidance or ecosystem best practices
                - domain references relevant to preservation or compatibility

            [ ] If external research is requested, or if repo-only evidence is insufficient,
                define a narrow external research target before proceeding.
                Clarify:
                - what exact structural or behavioral question the external research must answer
                - which sources, libraries, or patterns are relevant
                - whether the goal is migration guidance, pattern validation,
                  feasibility insight, or risk discovery
                Do not default to broad web research without a concrete reason.

            [ ] If no external browsing capability is available in the current tool context,
                ask the user for links, names, screenshots, notes, or examples to analyze.
                Do not make broad external claims without traceable sources.

            [ ] Keep the content in-bounds while forming the research nucleus and before scaffolding:
                - Include current responsibilities, boundaries, coupling, duplication,
                  test-suite coupling, preservation goals, architectural tensions,
                  strategy-sensitive boundaries when materially relevant,
                  external references,
                  assumptions, open questions, risks, candidate seams, and expected results
                  as planning input.
                - Follow DOCUMENTATION_STANDARD.md for presentation rules,
                  drafting discipline, tables, Mermaid, and diagram format.
                - Exclude chosen target design, implementation details, code or pseudo-code,
                  task breakdown, TDD cycles, estimates, milestones, and rollout plans.
                - Exclude "we will move X to Y" style commitments, even when inspired by
                  external examples.

            [ ] Before scaffolding, produce a short research nucleus that is stable enough
                for first-time-right drafting.
                It must contain:
                - the current refactor framing
                - the likely blast radius, risky boundaries,
                  and affected test suites, helpers, and fixtures
                - preservation goals, invariants, and behaviors that must remain stable
                - coupling, duplication, or responsibility problems that motivate the refactor
                - architectural constraints already visible
                - strategy-sensitive boundaries and viable policy options
                  when preservation alone may not hold
                - candidate seams, unknowns, assumptions, and risks
                - expected results that should inform planning

            [ ] Do not scaffold the research document until the research nucleus is stable enough
                for first-time-right drafting.

            [ ] Create the research artifact: scaffold_artifact(artifact_type='research', name='research', context={..., 'approved_strategy': '...', 'expected_results': '...'}).
            [ ] Fill the scaffolded document with evidence-backed content.
                Use the template's optional sections where they materially improve the research.
                Follow DOCUMENTATION_STANDARD.md while drafting the document.

            [ ] Self-check before finalizing:
                - If a statement sounds like a chosen design, implementation instruction,
                  sequence plan, or plan commitment, move it out of research.
                - Treat external findings as evidence, not as decisions.
                - If preservation alone may not be sufficient, present options and a recommendation
                  as decision input, not as a chosen policy.
                - Verify the research closes with an Approved Strategy entry,
                  even if it records that preserving supported behavior remains the chosen policy.
                - Prefer concrete evidence over general statements: cite specific files,
                  symbols, behaviors, and references where possible.
                - Verify the draft follows DOCUMENTATION_STANDARD.md.
            [ ] Interaction checkpoint before commit: present preservation goals,
                risky boundaries, candidate seams, unresolved questions,
                and any boundaries requiring explicit strategy approval to the user.
                If strategy-sensitive boundaries are in scope, ask the user to choose the policy
                per relevant boundary and capture the result in the research document as Approved Strategy.
                If preserving supported behavior remains the right policy, capture that explicitly
                as the Approved Strategy before committing.
                If research suggests the refactor should be narrowed, split, or reframed,
                stop and ask before committing.

            [ ] Commit: git_add_or_commit(workflow_phase='research', message='Research findings (#N)')
            [ ] First push: git_push(set_upstream=True)  # creates remote tracking branch; do once on this branch
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Research → Planning Hand-over
            #### Scope
            - Issue: #N
            - Refactor focus: <one sentence>

            #### Findings
            - Preservation goals / invariants: <behavior and contracts that must remain stable>
            - Risky boundaries / blast radius: <production files, test files, helpers, fixtures, modules, flows, and dependency edges>
            - Architectural tensions: <coupling, duplication, boundary violations, or anti-patterns>
            - Candidate seams: <safe split points that planning can use>
            - Expected results: <outcome framing for planning>

            #### Approved Strategy
            - Boundary / preservation scope: <affected boundaries and consumers, or 'no special migration policy required'>
            - Selected strategy: <preserve compatibility | temporary bridge | clean break>
            - Rationale: <why this policy was chosen>
            - Constraints for later phases: <what planning and implementation must respect>

            #### Open Questions
            - <question that planning must resolve>

            #### Files
            - docs/development/issueN/research.md (new)

            #### Stop-Go Proof
            - Research doc committed
      - name: planning
        exit_requires:
          - id: planning-doc
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/planning*.md
        instructions:
          sub_role: planner
          phase_instructions: |
            [ ] Read the research artifact, the research hand-over, and the Approved Strategy from the previous phases.
            [ ] Read DOCUMENTATION_STANDARD.md before drafting or scaffolding the planning document.
            [ ] Read ARCHITECTURE_PRINCIPLES.md before fixing cycle boundaries,
                preservation obligations, or implementation constraints.
            [ ] Read TYPE_CHECKING_PLAYBOOK.md before defining typing or static-analysis
                obligations for the implementation phase.
            [ ] Use explore_subagent to gather concrete evidence about how this refactor
                should be sliced into implementation cycles.
                Ask it to identify:
                - the smallest safe refactor slices implied by the research findings
                - affected production modules, test suites, fixtures, and helpers per slice
                - preservation goals, invariants, and risky boundaries that each slice must respect
                - migration order, cleanup order, and dependency edges between slices
                - the execution consequences of the Approved Strategy for preservation,
                  bridge use, cutover steps, or cleanup when applicable
                - unknowns that would make the implementation phase discover planning mistakes too late

            [ ] Interaction checkpoint: present the planning framing to the user before going deeper.
                Include:
                - the proposed cycle strategy and likely cycle count
                - the Approved Strategy and the constraints it imposes on preservation
                - preservation goals and the highest-risk seams or boundaries
                - expected production and test-suite impact
                - expected typing, quality-gate, and cleanup obligations
                - major unknowns still blocking a sound plan
                Ask whether any sequencing, preservation, or risk trade-off priority
                should influence the cycle breakdown.

            [ ] Keep the planning in-bounds while forming the planning nucleus and before scaffolding:
                - Include sequential cycle decomposition, scope boundaries, dependencies,
                  preservation goals, invariants, per-cycle deliverables, per-cycle exit criteria,
                  validation obligations, test-suite impact, typing expectations,
                  quality-gate expectations, grep or cleanup expectations,
                  Approved Strategy constraints, assumptions, open questions, risks,
                  and out-of-scope notes.
                - Treat production code, test files, fixtures, and helpers as equally relevant
                  planning surfaces when defining blast radius and validation obligations.
                - Translate the Approved Strategy into execution boundaries,
                  preservation obligations, bridge or cutover steps, and cleanup only when that strategy requires them.
                - Do not compare or choose preserve compatibility, temporary bridge,
                  or clean break in planning.
                - If the Approved Strategy is missing, ambiguous, internally contradictory,
                  or appears technically unsound, stop and activate a human-in-the-loop checkpoint
                  instead of re-deciding strategy inside planning.
                - Make quality gates explicit for the implementation phase, especially during
                  REFACTOR, and apply them to changed production and test files.
                - Exclude hidden redesign, new research, production implementation code,
                  line-by-line patch plans, exact commit messages, and milestone management.
                - Exclude "we will move line X from file Y to file Z" style commitments.

            [ ] Before scaffolding, produce a short planning nucleus that is stable enough
                for first-time-right drafting.
                It must contain:
                - the approved refactor goal and preservation constraints
                - the Approved Strategy constraints that implementation must respect
                - the proposed sequential cycles and why each boundary exists
                - expected production and test-suite changes per cycle
                - deliverable ids and exit criteria per cycle
                - architecture, typing, quality, and cleanup obligations per cycle
                - dependencies, assumptions, open questions, and highest-risk seams

            [ ] Do not scaffold the planning document until the planning nucleus is stable enough
                for first-time-right drafting.

            [ ] Create the planning artifact: scaffold_artifact(artifact_type='planning', name='planning').
            [ ] Fill the scaffolded document with evidence-backed content.
                Use the template's optional sections where they materially improve the plan.
                Follow DOCUMENTATION_STANDARD.md while drafting the document.
                Keep the planning document aligned with the structured payload that will be saved
                through save_planning_deliverables.

            [ ] Build the save_planning_deliverables payload from the finalized plan.
                Ensure:
                - cycles.total equals the number of cycles
                - cycle_number values are sequential and 1-based
                - every cycle has a non-empty deliverables list
                - every cycle has a non-empty exit_criteria string
                - deliverable ids are stable and specific enough for later updates or validation
                - cycle deliverables cover both production and test artifacts where both are affected

            [ ] Save deliverables: save_planning_deliverables(issue_number=N, planning_deliverables={...})

            [ ] Self-check before the final user checkpoint:
                - If the plan exposes a contradiction, scope error, hidden redesign,
                  or an unusable Approved Strategy, stop and activate a human-in-the-loop checkpoint.
                  Do not invent a target design from planning.
                - If a cycle is too large for one RED → GREEN → REFACTOR slice,
                  split it before finalizing.
                - Verify that preservation goals, test-suite impact, typing obligations,
                  quality-gate expectations, cleanup expectations, and Approved Strategy
                  execution constraints are explicit where they matter.
                - Verify the draft follows DOCUMENTATION_STANDARD.md.
                - Verify the saved payload matches the document's cycle structure and ids.

            [ ] Interaction checkpoint before internal QA: present the cycle breakdown,
                preservation strategy, test-suite impact, typing and gate obligations,
                cleanup expectations, Approved Strategy execution consequences,
                and unresolved questions to the user.
                If the boundaries or priorities are wrong, revise before review.

            [ ] Internal QA checkpoint before commit: invoke the qa agent with sub-role plan-verifier
                to review the plan.
                Ask QA as plan-verifier to verify:
                - alignment with the research artifact, research hand-over, and Approved Strategy
                - the cycle boundaries are sequential, implementation-sized,
                  and do not hide redesign inside planning
                - preservation goals, test-suite impact, typing obligations,
                  quality-gate expectations, cleanup expectations,
                  and Approved Strategy execution constraints are explicit
                - the save_planning_deliverables payload matches the document's cycle structure and ids
                - the plan stays within planning-phase scope and is usable by the implementation phase
                Return PASS or FAIL with exact gaps.
                If model selection is supported in the current environment,
                prefer a model different from the active implementation agent.

            [ ] If internal QA returns FAIL, revise the plan and repeat the same QA checkpoint
                before committing.

            [ ] Commit: git_add_or_commit(workflow_phase='planning', message='Planning for #N')
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Planning → QA Hand-over
            #### Scope
            - Issue: #N
            - Cycles planned: <N>
            - Planning focus: <one sentence>

            #### Review Targets
            - Cycle strategy: <how the refactor was split and why>
            - Research / preservation alignment: <which findings and invariants the plan preserves>
            - Approved Strategy alignment: <which strategy constraints the plan operationalizes>
            - Test / validation / cleanup strategy: <what implementation must prove, including test-suite, typing, quality-gate, cleanup, and strategy-driven execution obligations>
            - Highest-risk seams / dependencies: <where sequencing matters most>
            - Open questions: <what remains unresolved>

            #### Files
            - docs/development/issueN/planning.md (new)

            #### Stop-Go Proof
            - Planning doc committed
            - save_planning_deliverables(...) persisted successfully
      - name: implementation
        cycle_based: true
        subphases: [red, green, refactor]
        commit_type_map:
          red: test
          green: feat
          refactor: refactor
        exit_requires: []
        instructions:
          sub_role: implementer
          phase_instructions: |
            [ ] Call get_project_plan(issue_number=N) and get_work_context.
                Determine the active planned refactor cycle from workflow state and planning deliverables.
                Execute only planned cycles, in order, and do not widen scope beyond the active cycle.

            [ ] Use explore_subagent to load the pre-implementation context for the active refactor cycle.
                Ask it to return:
                - a short orientation for the active cycle, preservation goals, and prerequisites
                - the relevant research findings, preservation constraints,
                  and Approved Strategy constraints for this cycle
                - the RED scope: characterization, regression, or invariant tests to add or update,
                  and the intended failure condition
                - the GREEN checklist: structural changes, imports, fixtures, helpers,
                  call-site updates, and assertion updates
                - the REFACTOR scope for this cycle, if any
                - the cycle deliverables, preservation obligations,
                  cleanup expectations, exit criteria, and explicit out-of-scope items

            [ ] If the cycle context is missing, ambiguous, contradictory,
                or conflicts with planning, research, preservation goals,
                or the Approved Strategy, stop and raise a blocker.
                Do not redesign, re-plan, or change strategy inside implementation.

            [ ] Treat production code, test files, fixtures, and helpers as equally in scope
                for architecture, typing, and quality expectations.
                If typing or static-analysis issues appear,
                read TYPE_CHECKING_PLAYBOOK.md and apply it to both production and test code.

            [ ] RED:
                - write the failing characterization, regression, or invariant tests for the active cycle only
                - include collateral test updates in RED when they are part of the same planned structural change
                - run run_tests(path='<test file>::<class>::<method>') for the new or changed test scope
                - confirm the failure is the intended RED condition, not an unrelated error
                - commit: git_add_or_commit(workflow_phase='implementation', sub_phase='red',
                  cycle_number=N, message='...')

            [ ] GREEN:
                - implement only the structural changes listed in the cycle context
                - add required imports, fixtures, helper changes, and call-site updates
                - run run_tests(path='<test file>') incrementally to keep the cycle visible
                - finish with all tests for the active cycle passing
                - commit: git_add_or_commit(workflow_phase='implementation', sub_phase='green',
                  cycle_number=N, message='...')

            [ ] REFACTOR:
                - apply only cleanup or code-structure changes that belong to the active cycle
                - do not widen scope beyond the planned refactor boundary
                - run run_tests(path='<relevant test file(s)>') again after cleanup
                - run_quality_gates(scope='files', files=['<all files touched in this cycle>'])
                - if refactor changes were made, commit:
                  git_add_or_commit(workflow_phase='implementation', sub_phase='refactor',
                  cycle_number=N, message='...')

            [ ] Internal QA checkpoint for the active cycle:
                invoke the qa agent with sub-role validation-reviewer and provide:
                - the cycle-specific implementation context
                - the files changed
                - the tests written or updated
                - the final narrow test result
                - the cycle deliverables claimed as satisfied
                Ask QA to verify:
                - the implementation matches the active cycle scope
                - the planned deliverables, preservation goals,
                  cleanup expectations, and exit criteria for this cycle are satisfied
                - no hidden redesign or unplanned behavior changes were introduced
                - architectural and Approved Strategy constraints were preserved
                - the active-cycle tests are green
                Return PASS or FAIL with exact gaps.

            [ ] If internal QA returns FAIL, fix the finding, rerun the affected step,
                and repeat the same QA checkpoint before proceeding.

            [ ] If internal QA returns PASS and more cycles remain:
                transition_cycle(to_cycle=N+1), then get_work_context,
                and repeat the same cycle protocol automatically.

            [ ] If internal QA returns PASS and no cycles remain:
                report a concise implementation outcome to the user including:
                - cycles executed
                - key files changed
                - preservation goals and cleanup now completed
                - final narrow tests and file-scoped gates
                - deliverables now satisfied
                - ready for transition_phase(to_phase='validation')

            [ ] Do not call transition_phase(to_phase='validation') autonomously.
                Stop after the concise user update and wait for the next instruction.
      - name: validation
        exit_requires:
          - id: validation-report
            type: file_glob
            required: true
            dir: docs/development
            pattern: issue*/validation*.md
        instructions:
          sub_role: validator
          phase_instructions: |
            [ ] Call get_project_plan(issue_number=N) and get_work_context.
                Treat validation as the first branch-wide verification phase after
                the refactor implementation cycles are complete.

            [ ] Read the research artifact, planning artifact,
                the Approved Strategy, ARCHITECTURE_PRINCIPLES.md,
                and DOCUMENTATION_STANDARD.md before validating the branch.
                Use them as the authoritative baseline for what the refactor
                was supposed to preserve, clean up, and prove.

            [ ] Use explore_subagent to gather concrete branch-wide validation context.
                Ask it to identify:
                - the planned cycle deliverables, preservation goals,
                  cleanup expectations, and exit criteria that implementation
                  should now have satisfied
                - the files, boundaries, helpers, fixtures, and tests most affected
                  by the completed refactor cycles
                - the highest-risk surfaces that still need explicit branch-wide proof
                - the Approved Strategy constraints and preservation constraints that validation
                  must confirm were preserved
                - a live demonstration proposal for the refactor when practical,
                  or the closest observable fallback when no meaningful live demo exists
                - residual risks, caveats, or open questions that the validation report
                  should disclose explicitly

            [ ] If the validation context shows that implementation is incomplete,
                contradictory to planning or research, or in conflict with the Approved Strategy,
                stop and raise a blocker.
                Do not redesign, re-plan, or patch implementation from validation.

            [ ] Run full test suite: run_tests(scope='full')
            [ ] Run quality gates: run_quality_gates(scope='branch')

            [ ] Compare the branch-wide validation evidence against:
                - the planned cycle deliverables, preservation goals,
                  cleanup expectations, and exit criteria
                - the research findings and refactor boundaries that implementation was expected to preserve
                - the Approved Strategy constraints that implementation was expected to honor
                - the architecture principles materially relevant to this issue
                Record any mismatch explicitly; do not reinterpret the plan to make the branch pass.

            [ ] Build a live demonstration proposal for the user.
                It must include:
                - the smallest observable behavior or operator-visible outcome that can demonstrate the refactor safely
                - exact preconditions and steps
                - what the user should observe now
                - when no meaningful live demo exists, an explicit explanation of why not
                - the closest observable fallback evidence the user can review instead

            [ ] Create or update docs/development/issueN/validation.md.
                Document:
                - validation scope and prerequisites
                - summary verdict
                - full-suite test result
                - branch quality-gate result
                - mapping from planning deliverables or exit criteria to observed evidence
                - research and Approved Strategy alignment
                - the live demonstration proposal or explicit fallback rationale
                - residual risks, caveats, limitations, and follow-up items
                - exact failure evidence when validation is not green

            [ ] Self-check before commit:
                - If run_tests(scope='full') failed, the validation report must say FAIL
                  and include the exact failing scope.
                - If run_quality_gates(scope='branch') failed, the validation report must say FAIL
                  and include the exact failing gate or file scope.
                - If planning, research, or Approved Strategy alignment cannot be established,
                  do not declare PASS.
                - If the refactor is not practically demoable live,
                  the validation report must explain why and propose the closest observable fallback.
                - Do not hide caveats, soft failures, or incomplete evidence behind a green summary.

            [ ] Commit: git_add_or_commit(workflow_phase='validation', message='Validation for #N')
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Validation → QA Hand-over
            #### Scope
            - Issue: #N
            - Validation focus: <branch-wide verification after refactor cycles>

            #### Review Targets
            - Full-suite result: <summary of run_tests(scope='full')>
            - Branch gate result: <summary of run_quality_gates(scope='branch')>
            - Planning / preservation alignment: <which deliverables, preservation goals, and cleanup expectations are now evidenced>
            - Research / Approved Strategy alignment: <which constraints were preserved or where mismatches remain>
            - Live demonstration proposal: <how the user can observe the preserved behavior, or why no meaningful live demo exists>
            - Residual risks / caveats: <what remains important for QA to examine>

            #### Files
            - docs/development/issueN/validation.md (new or updated)

            #### Stop-Go Proof
            - Tests: run_tests(scope='full') → <result>
            - Gates: run_quality_gates(scope='branch') → <result>
            - Verdict: PASS | FAIL
      - name: documentation
        instructions:
          sub_role: documenter
          phase_instructions: |
            [ ] Call get_project_plan(issue_number=N) and get_work_context.
                Treat documentation as the docs-workspace reconciliation and close-out phase after validation.

            [ ] Read docs/development/issueN/validation.md
                and DOCUMENTATION_STANDARD.md before editing documentation.
                Use validation as the authoritative source for preservation claims and observed outcomes.
                Treat docs/development/issueN/*.md, archived docs, and other historical workflow artifacts
                as context by default, not active documentation.
                Update them only when validation explicitly requires it,
                they are the authoritative deliverable for the current phase,
                or the user explicitly asks for it.

            [ ] Use explore_subagent to scan the documentation workspace for surfaces affected by this refactor.
                Ask it to identify:
                - developer-facing, operator-facing, and user-facing docs that need final alignment
                - issue-local, archived, or historical artifacts that may provide context
                  but should normally remain unchanged
                - stale migration notes, cleanup notes, examples, commands, diagrams,
                  runbooks, screenshots, and cross-links
                - docs that were reviewed and can remain unchanged
                - the smallest safe set of documentation updates needed to leave the workspace coherent

            [ ] Update or create the relevant documentation files.
                Prioritize:
                - developer or operator docs that must stay aligned with the delivered refactor
                - stale migration notes, cleanup notes, examples, commands,
                  diagrams, runbooks, links, and screenshots
                - explanations of preserved behavior or changed maintenance expectations when they materially help future work

            [ ] Keep the documentation coherent across the docs workspace:
                - every preservation or behavior claim must trace back to validation evidence
                - surrounding explanatory text, migration notes, cleanup notes, and supporting guidance
                  should be brought back in sync with the delivered refactor
                - record which docs surfaces were updated and which were reviewed and left unchanged
                - if the docs scan reveals a gap that needs a new finding, a new scope decision,
                  or newly deferred work, stop and raise a blocker for human review
            [ ] Prepare the Documentation → QA hand-over.
                It must cover:
                - documentation scan coverage across the docs workspace
                - which documentation files were updated and why
                - which documentation surfaces were reviewed and left unchanged, with rationale
                - how the updated docs reflect the preserved behavior or refactor outcome
                - residual caveats or limitations that remain visible in the docs

            [ ] Self-check before commit:
                - preservation and behavior claims trace back to validation evidence
                - stale migration notes, cleanup notes, examples, commands,
                  diagrams, links, or screenshots are not silently outdated
                - reviewed-but-unchanged docs are intentional and defensible
                - the documentation follows DOCUMENTATION_STANDARD.md

            [ ] Commit: git_add_or_commit(workflow_phase='documentation', message='Documentation for #N')
            [ ] Produce hand-over for QA doc review.
          handover_template: |
            ### Documentation → QA Hand-over
            #### Scope
            - Issue: #N
            - Documentation focus: <what refactor-facing communication was clarified, corrected, or updated>

            #### Review Targets
            - Docs workspace coverage: <which surfaces were scanned>
            - Validation alignment: <which validated refactor outcomes the documentation reflects>
            - Updated docs: <which files changed and why>
            - Reviewed but unchanged: <which surfaces were checked and intentionally left as-is>
            - Residual caveats: <what remains visible and intentionally unresolved>

            #### Files
            - docs/... (updated)

            #### Stop-Go Proof
            - Documentation committed
      - name: ready
        instructions:
          sub_role: implementer
          phase_instructions: |
            The branch is ready for PR submission.

            [ ] Call get_project_plan(issue_number=N), get_work_context, and get_issue(issue_number=N).
                Read docs/development/issueN/validation.md
                and the updated documentation files that materially support the final PR narrative.

            [ ] Run final quality gate: run_quality_gates(scope='branch')
                If this fails, stop.

            [ ] If .phase-gate/state.json contains the final phase or transition audit trail
                for this branch, commit it before PR preparation.
                Do not leave the last branch audit trail as dirty local state
                just because submit_pr may later neutralize branch-local artifacts.

            [ ] Build the definitive deferred-work transfer from authoritative issueN artifacts only.
                For each item capture:
                - concise title
                - why it is explicitly out of scope for this branch
                - source artifact that established the deferral
                - impact if it remains open
