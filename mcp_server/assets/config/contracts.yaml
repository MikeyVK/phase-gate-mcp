      - name: ready
        instructions:
          sub_role: implementer
          phase_instructions: |
            The branch is ready for PR submission.

            [ ] Call get_project_plan(issue_number=N), get_work_context, and get_issue(issue_number=N).
                Read docs/development/issueN/validation.md
                and the updated documentation files that materially support the final PR narrative.

            [ ] Run final quality gate: run_quality_gates(scope='branch')
                If this fails, stop.

            [ ] If .phase-gate/state.json contains the final phase or transition audit trail
                for this branch, commit it before PR preparation.
                Do not leave the last branch audit trail as dirty local state
                just because submit_pr may later neutralize branch-local artifacts.

            [ ] Build the definitive deferred-work transfer from authoritative issueN artifacts only.
                For each item capture:
                - concise title
                - why it is explicitly out of scope for this branch
                - source artifact that established the deferral
                - impact if it remains open
                - tracking state: explicit issue reference already present, or CO triage required

            [ ] Keep the deferred-work transfer strict and audit-ready:
                - carry forward only items already established by issueN artifacts
                - package the transfer so @co can act without reconstructing the branch history
                - leave issue triage and issue-body curation to @co
                - if an item is not actually established by the issue artifacts, stop and raise a blocker

            [ ] Scaffold the PR body with the existing PR template.
                Call scaffold_artifact(artifact_type='pr', name='pr', context={...}).
                Populate at minimum:
                - title: finalized PR title
                - summary: concise bug-fix outcome summary grounded in validation and updated documentation
                - changes: concise summary of the delivered bug-fix changes
                - testing: validation evidence and final gate result actually obtained
                - checklist_items: release-ready checklist entries
                - related_docs: validation report and updated documentation the reviewer should open
                - closes_issues: [N] when the PR closes the issue
                - breaking_changes: only when explicitly supported by authoritative issue artifacts
                - deferred_work: deferred items from authoritative issue artifacts (omit when none)
                - tracking_state: tracking state for deferred items (issue refs or triage notes)

            [ ] Read the scaffolded PR markdown from the returned artifact path
                and use that template output as the body for submit_pr.

            [ ] Verify the original issue body still honestly describes the branch intent and scope:
                - if research broadened or changed scope, update the issue body before PR creation
                - use update_issue(issue_number=N, body="<updated>") when changes are needed

            [ ] Review all issues explicitly in scope: decide which are closure-ready on this branch:
                - for each in-scope issue, decide: close on merge via Closes #N, or explicitly defer
                - encode only closure-ready issues in the PR body via Closes #N

            [ ] Carry deferred work into the PR body as the persistent @imp → @co transfer artifact:
                - populate the PR body with deferred_work and tracking_state scaffold fields
                - the PR body must carry: delivered scope, Closes #N claims, deferred items, tracking state
                - the hand-over template is a completeness check, not a replacement for PR body facts

            [ ] Verify the PR body is complete using the handover template as a completeness check:
                - does the PR body carry: delivered scope, Closes #N claims, deferred items, tracking state?
                - use the hand-over template sections as a gate before calling submit_pr

            [ ] Commit state files before PR: git_add_or_commit(workflow_phase='ready', message='chore: update phase-gate state before PR')
                  Ensures .phase-gate/state.json and any other dirty tracked files are committed.
                  submit_pr requires a clean working tree — this step must always precede it.

            [ ] Submit PR: submit_pr(head='<branch>', title='<title>', body='<scaffolded pr markdown>')
            [ ] Do NOT call merge_pr — human approval required.
            [ ] Produce the hand-over required by the handover_template before ending the session.
          handover_template: |
            ### Ready → CO / Merge Hand-over
            #### Scope
            - Issue: #N
            - PR focus: <what the PR packages for merge>
            - Deferred transfer focus: <what @co must preserve for follow-up tracking>

            #### Delivery Targets
            - PR body alignment: <which validation and documentation artifacts the PR body reflects>
            - Template usage: PR body scaffolded via artifact_type='pr'
            - Final gate result: <summary of run_quality_gates(scope='branch')>
            - Deferred work transfer: <items carried forward from authoritative issue artifacts only>
            - Tracking state: <explicit issue refs already present vs CO triage required>

            #### Files
            - docs/development/issueN/validation.md
            - docs/... (updated)

            #### Stop-Go Proof
            - Quality gates: run_quality_gates(scope='branch') → <result>
            - PR body scaffolded: scaffold_artifact(artifact_type='pr', name='pr', context={...})
            - Deferred-work transfer prepared for @co
            - PR submitted (merge requires human approval)
  hotfix:
    phases:
      - name: implementation
        cycle_based: true
        subphases: [red, green, refactor]
        commit_type_map:
          red: test
          green: feat
          refactor: refactor
        exit_requires: []
        instructions:
          sub_role: implementer
          phase_instructions: |
            [ ] Call get_project_plan(issue_number=N), get_work_context,
                and get_issue(issue_number=N).
                Determine the active hotfix cycle or minimal containment slice from workflow state,
                issue context, and any available deliverables.
                Execute only the smallest safe hotfix slice and do not widen scope without explicit approval.

            [ ] First push (cycle 1 only): git_push(set_upstream=True)  # creates remote tracking branch; do once on this branch

            [ ] Use explore_subagent to load the pre-implementation context for the active hotfix slice.
                Ask it to return:
                - a short orientation for the active hotfix slice, current failure, and prerequisites
                - the relevant failure evidence, explicit user-approved constraints,
                  and supported behavior boundaries
                - the RED scope: tests to add or update and the intended failure condition
                - the GREEN checklist: production changes, imports, fixtures, helpers,
                  call-site updates, and assertion updates
                - the REFACTOR scope for this slice, if any
                - the hotfix objective, exit criteria if any,
                  and explicit out-of-scope items

            [ ] If the cycle context is missing, ambiguous, contradictory,
                or conflicts with the issue, current failure evidence,
                or explicit hotfix constraints, stop and raise a blocker.
                Do not broaden the hotfix, redesign, or invent policy inside implementation.

            [ ] Treat production code, test files, fixtures, and helpers as equally in scope
                for architecture, typing, and quality expectations.
                If typing or static-analysis issues appear,
                read TYPE_CHECKING_PLAYBOOK.md and apply it to both production and test code.

            [ ] RED:
                - write the failing test or tests for the active hotfix slice only
                - include collateral test updates in RED when they are part of the same planned hotfix correction
                - run run_tests(path='<test file>::<class>::<method>') for the new or changed test scope
                - confirm the failure is the intended RED condition, not an unrelated error
                - commit: git_add_or_commit(workflow_phase='implementation', sub_phase='red',
                  cycle_number=N, message='...')

            [ ] GREEN:
                - implement only the changes listed in the cycle context
                - add required imports, fixtures, helper changes, and call-site updates
                - run run_tests(path='<test file>') incrementally to keep the slice visible
                - finish with all tests for the active slice passing
                - commit: git_add_or_commit(workflow_phase='implementation', sub_phase='green',
                  cycle_number=N, message='...')

            [ ] REFACTOR:
                - apply only cleanup that belongs to the active hotfix slice
                - do not widen scope beyond the approved containment boundary
                - run run_tests(path='<relevant test file(s)>') again after cleanup
                - run_quality_gates(scope='files', files=['<all files touched in this cycle>'])
                - if refactor changes were made, commit:
                  git_add_or_commit(workflow_phase='implementation', sub_phase='refactor',
                  cycle_number=N, message='...')

            [ ] Internal QA checkpoint for the active cycle:
                invoke the qa agent with sub-role validation-reviewer and provide:
                - the cycle-specific implementation context
                - the files changed
                - the tests written or updated
                - the final narrow test result
                - the hotfix objective or deliverables claimed as satisfied
                Ask QA to verify:
                - the implementation matches the active hotfix scope
                - the stated hotfix objective and exit criteria for this cycle are satisfied
                - no unplanned files or broader behavior changes were introduced
                - architectural constraints and explicit user-approved boundaries were preserved
                - the active-cycle tests are green
                Return PASS or FAIL with exact gaps.

            [ ] If internal QA returns FAIL, fix the finding, rerun the affected step,
                and repeat the same QA checkpoint before proceeding.

            [ ] If internal QA returns PASS and more cycles remain:
                transition_cycle(to_cycle=N+1), then get_work_context,
                and repeat the same cycle protocol automatically.

            [ ] If internal QA returns PASS and no cycles remain:
                report a concise implementation outcome to the user including:
                - cycles executed
                - key files changed
                - hotfix behavior now corrected or contained
                - final narrow tests and file-scoped gates
                - ready for transition_phase(to_phase='validation')

            [ ] Do not call transition_phase(to_phase='validation') autonomously.
                Stop after the concise user update and wait for the next instruction.
