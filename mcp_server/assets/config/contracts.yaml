                  strategy-sensitive shared boundaries when materially relevant,
                  external references, prior art, and architectural constraints,
                  assumptions, open questions, risks, and expected results as planning input.
                - Follow DOCUMENTATION_STANDARD.md for presentation rules,
                  drafting discipline, tables, Mermaid, and diagram format.
                - Exclude child issue creation, chosen decomposition decisions,
                  implementation details, code or pseudo-code, task breakdown,
                  TDD cycles, estimates, milestones, and execution plans.
                - Exclude "we will create these issues" style commitments, even when inspired by
                  external examples.

            [ ] Before scaffolding, produce a short research nucleus that is stable enough
                for first-time-right drafting.
                It must contain:
                - the current epic framing
                - candidate workstreams, affected systems,
                  and shared integration, contract, or acceptance suites
                - key dependencies, stakeholder surfaces, and likely sequencing constraints
                - reusable patterns or prior art
                - architectural constraints already visible
                - strategy-sensitive shared boundaries and viable policy options
                  when materially relevant
                - unknowns, assumptions, and risks
                - expected results that should inform planning and decomposition

