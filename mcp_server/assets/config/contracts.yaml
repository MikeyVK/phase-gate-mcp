                - existing patterns or prior art worth reusing
                - dependencies, sequencing constraints, and architectural constraints
                - any shared boundaries, stakeholder-facing contracts, or cross-workstream
                  cutover points that may require explicit human choice
                - unknowns that planning must resolve before decomposition

            [ ] Interaction checkpoint: present a short orientation to the user before going deeper.
                Include:
                - current understanding of the epic
                - likely workstreams, affected domains,
                  and shared integration or acceptance suites
                - key dependencies, stakeholder surfaces, and architectural constraints
                - major unknowns still blocking good research
                Ask whether external research should be included, for example:
                - competitor workflows or product behavior
                - prior art in the wider ecosystem
                - external standards, regulations, or published guidance
                - domain references that shape scope or sequencing

            [ ] If external research is requested, or if repo-only evidence is insufficient,
                define a narrow external research target before proceeding.
                Clarify:
                - what exact scope, dependency, or domain question the external research must answer
                - which sources or competitors are relevant
                - whether the goal is inspiration, parity analysis, domain understanding,
                  feasibility insight, or risk discovery
                Do not default to broad web research without a concrete reason.

            [ ] If no external browsing capability is available in the current tool context,
                ask the user for links, names, screenshots, notes, or examples to analyze.
                Do not make broad external claims without traceable sources.

            [ ] Keep the content in-bounds while forming the research nucleus and before scaffolding:
