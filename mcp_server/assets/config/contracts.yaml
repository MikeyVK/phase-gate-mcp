                If no special policy is needed, capture that explicitly as the Approved Strategy
                before committing.
                If research suggests the issue is upstream, duplicated, mis-scoped, or
                broader than filed, stop and ask before committing.

            [ ] Commit: git_add_or_commit(workflow_phase='research', message='Research findings (#N)')
            [ ] First push: git_push(set_upstream=True)  # creates remote tracking branch; do once on this branch
            [ ] Produce the hand-over required by the handover_template before ending the session.
