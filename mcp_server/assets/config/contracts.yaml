        instructions:
          sub_role: epic-researcher
          phase_instructions: |
            [ ] Read the epic issue: get_issue(issue_number=N).
            [ ] Read ARCHITECTURE_PRINCIPLES.md before drawing conclusions.
            [ ] Read DOCUMENTATION_STANDARD.md before drafting or scaffolding the research document.
            [ ] Use explore_subagent to gather concrete evidence about this epic.
