# Git Conventions Configuration (Issue #55)
# All git-related validations and defaults centralized here

# Convention #1: Branch types (create_branch validation)
branch_types:
  - feature
  - bug
  - fix
  - refactor
  - docs
  - hotfix
  - epic

# Convention #2: Protected branches (cannot be deleted)
protected_branches:
  - main
  - master
  - develop

# Convention #3: Branch name pattern (kebab-case validation)
branch_name_pattern: "^[a-z0-9-]+$"

# Convention #4: Conventional Commit types (Issue #138)
# Source: https://www.conventionalcommits.org/
commit_types:
  - feat
  - fix
  - docs
  - style
  - refactor
  - test
  - chore
  - perf
  - ci
  - build
  - revert

# Conventions #9-11: Default base branch for PR creation
default_base_branch: main

# Convention #12: Issue title maximum length (Issue #149)
issue_title_max_length: 72
